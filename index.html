  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لعبة الأرنب</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
    * { box-sizing: border-box; }
  body {
    background:#0a0e1a;
    color:#fff;
    font-family: Tahoma, Arial;
    text-align:center;
    padding:20px;
    margin:0;
    overflow-x:hidden;
    position:relative;
  }

  /* خلفية متحركة */
  body::before {
    content:'';
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background: linear-gradient(45deg, #1e293b, #0f172a, #1e40af, #0f172a);
    background-size:400% 400%;
    animation: gradientShift 15s ease infinite;
    z-index:-2;
  }
  body::after {
    content:'';
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    background-image:
      linear-gradient(rgba(59,130,246,0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.1) 1px, transparent 1px);
    background-size:50px 50px;
    animation: gridMove 20s linear infinite;
    z-index:-1;
  }
  @keyframes gradientShift {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }
  @keyframes gridMove {
    0%{transform:translate(0,0)}
    100%{transform:translate(50px,50px)}
  }

.card {
    background:rgba(30,41,59,0.8);
    padding:20px;
    border-radius:16px;
    max-width:450px;
    margin:20px auto;
    position:relative;
    border:2px solid transparent;
    background-clip:padding-box;
    box-shadow:0 0 30px rgba(59,130,246,0.3);
  }
.card::before {
    content:'';
    position:absolute;
    top:-2px; left:-2px; right:-2px; bottom:-2px;
    background:linear-gradient(45deg, #3b82f6, #facc15, #3b82f6);
    border-radius:16px;
    z-index:-1;
    animation:borderGlow 3s linear infinite;
  }
  @keyframes borderGlow {
    0%,100%{opacity:1}
    50%{opacity:0.5}
  }

  input, button {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:10px;
    border:1px solid #475569;
    font-size:16px;
    background:#334155;
    color:#fff;
  }
  input:focus {
    outline:none;
    border-color:#3b82f6;
    box-shadow:0 0 10px rgba(59,130,246,0.5);
  }
  button {
    background:linear-gradient(90deg,#facc15,#fbbf24);
    color:#000;
    font-weight:bold;
    cursor:pointer;
    border:none;
    transition:0.3s;
  }
  button:hover {
    transform:translateY(-2px);
    box-shadow:0 5px 20px rgba(250,204,21,0.4);
  }
  button:disabled {
    background:#475569;
    color:#94a3b8;
    cursor:not-allowed;
    transform:none;
    box-shadow:none;
  }
.hidden { display:none; }

.diff {
    display:flex;
    gap:10px;
    justify-content:center;
    margin:15px 0;
    flex-wrap:wrap;
  }
.diff label {
    background:#334155;
    padding:10px 16px;
    border-radius:10px;
    cursor:pointer;
    flex:1;
    min-width:80px;
    border:1px solid #475569;
    transition:0.3s;
  }
.diff input { display:none; }
.diff input:checked + span {
    background:linear-gradient(90deg,#3b82f6,#60a5fa);
    color:#fff;
    padding:10px 16px;
    border-radius:10px;
    display:block;
    box-shadow:0 0 15px rgba(59,130,246,0.6);
  }

.game-area {
    background:rgba(15,23,42,0.9);
    padding:25px;
    border-radius:12px;
    margin:15px 0;
    min-height:180px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    border:1px solid #334155;
    position:relative;
    overflow:hidden;
  }
.game-area::before {
    content:'🐰';
    font-size:60px;
    position:absolute;
    animation:rabbitRun 2s linear infinite;
    opacity:0.3;
  }
  @keyframes rabbitRun {
    0%{left:-80px}
    100%{left:110%}
  }

.multiplier {
    font-size:52px;
    font-weight:bold;
    color:#facc15;
    margin:10px 0;
    text-shadow:0 0 20px rgba(250,204,21,0.6);
    animation:pulse 1s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100%{transform:scale(1)}
    50%{transform:scale(1.05)}
  }

.status {
    font-size:18px;
    margin:10px 0;
    color:#94a3b8;
  }
.balance {
    font-size:22px;
    color:#22c55e;
    margin:10px 0;
    font-weight:bold;
    text-shadow:0 0 10px rgba(34,197,94,0.5);
  }
.userid {
    background:#0f172a;
    padding:8px 12px;
    border-radius:8px;
    font-family:monospace;
    color:#60a5fa;
    border:1px solid #334155;
    display:inline-block;
    margin:5px 0;
  }
</style>
</head>
<body>

<div id="auth" class="card">
  <h2>🎮 تسجيل / دخول</h2>
  <input type="email" id="email" placeholder="الإيميل">
  <input type="password" id="password" placeholder="الباسورد">
  <button onclick="signUp()">إنشاء حساب</button>
  <button onclick="signIn()">دخول</button>
</div>

<div id="game" class="card hidden">
  <h3>مرحباً <span id="username"></span></h3>
  <p>المعرف المميز:</p>
  <div class="userid" id="userid"></div>
  <div class="balance">💰 الرصيد: <span id="balance">0</span> ج</div>

  <div class="diff">
    <label><input type="radio" name="diff" value="easy"><span>سهل</span></label>
    <label><input type="radio" name="diff" value="medium" checked><span>متوسط</span></label>
    <label><input type="radio" name="diff" value="hard"><span>صعب</span></label>
  </div>

  <div class="game-area">
    <div class="status" id="status">جاهز للعب</div>
    <div class="multiplier" id="multiplier">1.00x</div>
  </div>

  <input type="number" id="bet" placeholder="المبلغ" value="10" min="1">
  <button id="playBtn" onclick="startGame()">🚀 ابدأ</button>
  <button id="cashoutBtn" onclick="cashOut()" class="hidden">💵 سحب</button>
  <button onclick="logout()" style="background:linear-gradient(90deg,#ef4444,#dc2626); color:#fff; margin-top:15px;">تسجيل خروج</button>
</div>

<script>
const supabase = supabase.createClient('https://uftgmroollimzrhhehxv.supabase.co', 'sb_publishable_JxYGUjJp_-UTxITTpQdfIg_RCdcadZg');

let balance = 0;
let currentMultiplier = 1.0;
let gameRunning = false;
let gameInterval;
let userId = null;

async function signUp() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  if(!email ||!password) return alert('املى كل البيانات');

  const { error } = await supabase.auth.signUp({ email, password });
  if(error) alert(error.message);
  else alert('تم إنشاء الحساب! تقدر تدخل دلوقتي');
}

async function signIn() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { error } = await supabase.auth.signInWithPassword({ email, password });
  if(error) alert(error.message);
}

async function logout() {
  await supabase.auth.signOut();
}

async function loadProfile(user) {
  userId = user.id;
  const { data, error } = await supabase
  .from('profiles')
  .select('*')
  .eq('id', user.id)
  .single();

  if(error) {
    console.error(error);
    return;
  }

  balance = data.balance;
  document.getElementById('username').textContent = data.username || user.email.split('@')[0];
  document.getElementById('userid').textContent = user.id.slice(0, 8).toUpperCase();
  document.getElementById('balance').textContent = balance;
}

async function updateBalance(newBalance) {
  balance = Math.floor(newBalance);
  document.getElementById('balance').textContent = balance;

  const { error } = await supabase
  .from('profiles')
  .update({ balance: balance })
  .eq('id', userId);

  if(error) console.error('Error updating balance:', error);
}

supabase.auth.onAuthStateChange(async (event, session) => {
  if(session) {
    document.getElementById('auth').classList.add('hidden');
    document.getElementById('game').classList.remove('hidden');
    await loadProfile(session.user);
  } else {
    document.getElementById('auth').classList.remove('hidden');
    document.getElementById('game').classList.add('hidden');
    balance = 0;
    userId = null;
  }
});

function getCrashPoint() {
  const diff = document.querySelector('input[name="diff"]:checked').value;
  let max = 10;
  if(diff === 'easy') max = 5;
  if(diff === 'medium') max = 15;
  if(diff === 'hard') max = 30;
  return Math.random() * max + 1;
}

async function startGame() {
  if(gameRunning) return;

  const bet = parseFloat(document.getElementById('bet').value);
  if(bet > balance || bet < 1) return alert('المبلغ غلط');

  await updateBalance(balance - bet);

  gameRunning = true;
  currentMultiplier = 1.0;
  document.getElementById('status').textContent = 'جاري اللعب...';
  document.getElementById('playBtn').classList.add('hidden');
  document.getElementById('cashoutBtn').classList.remove('hidden');

  const crashPoint = getCrashPoint();

  gameInterval = setInterval(() => {
    currentMultiplier += 0.05;
    document.getElementById('multiplier').textContent = currentMultiplier.toFixed(2) + 'x';

    if(currentMultiplier >= crashPoint) {
      endGame(false);
    }
  }, 100);
}

function cashOut() {
  if(!gameRunning) return;
  endGame(true);
}

async function endGame(won) {
  clearInterval(gameInterval);
  gameRunning = false;

  const bet = parseFloat(document.getElementById('bet').value);

  if(won) {
    const winAmount = bet * currentMultiplier;
    await updateBalance(balance + winAmount);
    document.getElementById('status').textContent = `كسبت ${Math.floor(winAmount)} ج!`;
    document.getElementById('multiplier').style.color = '#22c55e';
  } else {
    document.getElementById('status').textContent = 'خسرت!';
    document.getElementById('multiplier').style.color = '#ef4444';
  }

  setTimeout(() => {
    document.getElementById('status').textContent = 'جاهز للعب';
    document.getElementById('multiplier').textContent = '1.00x';
    document.getElementById('multiplier').style.color = '#facc15';
    document.getElementById('playBtn').classList.remove('hidden');
    document.getElementById('cashoutBtn').classList.add('hidden');
  }, 2000);
}
</script>

</body>
</html>
