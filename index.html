  <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Chicken Road</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
        height: 100%;
        background: #1a1d2e;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        overflow: hidden;
    }

    #topBar {
        background: #1a1d2e;
        padding: 10px 15px;
        display: flex;
        align-items: center;
        justify-content: space-between;
    }
    #logo {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 800;
        font-size: 16px;
    }
    #balanceBox {
        background: #2d3042;
        padding: 8px 16px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 15px;
    }
    #rightIcons {
        display: flex;
        gap: 10px;
    }
    #adminPanelBtn {
        background: #ffd700;
        color: #000;
        padding: 8px 12px;
        border-radius: 10px;
        font-weight: 700;
        cursor: pointer;
        display: none;
    }
    #menuBtn {
        font-size: 24px;
        cursor: pointer;
    }

    #liveBar {
        background: #23263a;
        padding: 6px 15px;
        font-size: 13px;
        display: flex;
        align-items: center;
        gap: 12px;
        color: #8b8ea3;
    }
    #liveDot {
        width: 7px;
        height: 7px;
        background: #00ff88;
        border-radius: 50%;
        box-shadow: 0 0 8px #00ff88;
    }

    #gameArea {
        height: calc(100% - 210px);
        background: #2a2d3e;
        position: relative;
        overflow-x: auto;
        overflow-y: hidden;
        display: flex;
        align-items: center;
        padding: 0 20px;
    }

    #gameArea::before {
        content: '';
        position: absolute;
        left: 0;
        right: 0;
        top: 50%;
        height: 3px;
        background: repeating-linear-gradient(
            to right,
            rgba(255,255,255,0.15),
            rgba(255,255,255,0.15) 15px,
            transparent 15px,
            transparent 30px
        );
        transform: translateY(-50%);
    }

    #player {
        position: absolute;
        left: 50px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 70px;
        transition: left 0.4s ease;
        z-index: 10;
        filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
    }

.multiplier {
        position: relative;
        min-width: 85px;
        height: 85px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 800;
        font-size: 18px;
        transition: all 0.3s;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        border: 4px solid rgba(255,255,255,0.2);
        margin: 0 15px;
        flex-shrink: 0;
        z-index: 2;
    }
.multiplier.active {
        transform: scale(1.1);
        box-shadow: 0 0 30px currentColor;
        border-color: #fff;
    }
.multiplier.green {
        background: radial-gradient(circle at 30% 30%, #00ff88, #00d4aa);
        color: white;
    }
.multiplier.purple {
        background: radial-gradient(circle at 30% 30%, #6c5ce7, #a29bfe);
        color: white;
    }

 /* البوابة زي الصورة */
.multiplier.portal {
        width: 120px;
        height: 140px;
        background: url(attachment://0) no-repeat center;
        background-size: contain;
        border: none;
        box-shadow: none;
        border-radius: 0;
        position: relative;
    }

.portal-egg {
        position: absolute;
        top: -15px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 55px;
        filter: drop-shadow(0 0 15px #ffd700);
        animation: eggGlow 2s ease-in-out infinite;
    }

 @keyframes eggGlow {
        0%, 100% { filter: drop-shadow(0 0 15px #ffd700); }
        50% { filter: drop-shadow(0 0 25px #ffed4e); }
    }

    #panel {
        background: #1a1d2e;
        padding: 15px;
        border-top: 1px solid #2d3042;
        position: absolute;
        bottom: 0;
        width: 100%;
    }

    #betRange {
        background: #2d3042;
        padding: 10px 15px;
        border-radius: 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
        color: #8b8ea3;
        font-weight: 700;
        font-size: 14px;
    }
    #betRange.center {
        color: #fff;
        font-size: 18px;
    }

    #betQuick {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin-bottom: 12px;
    }
.betBtn {
        background: #2d3042;
        border: none;
        padding: 12px;
        border-radius: 12px;
        color: white;
        font-weight: 700;
        font-size: 15px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 4px;
        cursor: pointer;
    }
.betBtn span {
        background: #fff;
        color: #1a1d2e;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 800;
    }

    #actionBtns {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
    }
    #cashBtn {
        background: #ffc107;
        color: #000;
        font-weight: 800;
        font-size: 15px;
        padding: 16px;
        border-radius: 16px;
        line-height: 1.3;
    }
    #goBtn {
        background: #00d4aa;
        color: white;
        font-weight: 800;
        font-size: 20px;
        padding: 16px;
        border-radius: 16px;
    }
    button:disabled { opacity: 0.5; cursor: not-allowed; }

    #authScreen, #profilePanel, #adminPanel {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.95);
        display: none; align-items: center; justify-content: center;
        z-index: 100;
    }
.authBox {
        background: #2d3042;
        border-radius: 20px;
        width: 90%; max-width: 400px;
        padding: 25px;
    }
    input {
        width: 100%; padding: 14px; margin: 10px 0;
        border-radius: 12px; border: 1px solid #3a3d4e;
        background: #1a1d2e; color: white; outline: none;
    }
.btn {
        padding: 14px; border-radius: 12px; border: none;
        font-weight: 700; cursor: pointer;
        width: 100%; margin-top: 10px;
    }
.adminBox {
        background: #2d3042;
        border-radius: 20px;
        width: 90%; max-width: 500px;
        padding: 25px;
    }
.adminTitle {
        text-align: center;
        font-size: 22px;
        margin-bottom: 20px;
        color: #ffd700;
    }
.adminSection {
        background: #1a1d2e;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
    }
.adminSection h3 {
        margin-bottom: 10px;
        color: #00d4aa;
    }
</style>
</head>
<body>

<div id="authScreen">
  <div class="authBox">
    <h2 style="text-align:center; margin-bottom:15px;">Login</h2>
    <div id="loginForm">
      <input id="loginEmail" type="email" placeholder="Email">
      <input id="loginPass" type="password" placeholder="Password">
      <button class="btn" id="loginBtn" style="background:#00d4aa;">Login</button>
      <button class="btn" id="googleBtn" style="background:#fff;color:#000;">Login with Google</button>
      <p onclick="toggleForm()" style="text-align:center;margin-top:12px;cursor:pointer;color:#8b8ea3;">No account? Sign up</p>
    </div>
    <div id="signupForm" style="display:none;">
      <input id="signupName" type="text" placeholder="Name">
      <input id="signupEmail" type="email" placeholder="Email">
      <input id="signupPass" type="password" placeholder="Password">
      <button class="btn" id="signupBtn" style="background:#00d4aa;">Sign Up</button>
      <p onclick="toggleForm()" style="text-align:center;margin-top:12px;cursor:pointer;color:#8b8ea3;">Have account? Login</p>
    </div>
  </div>
</div>

<div id="gameScreen" style="display:none;height:100%;flex-direction:column;">
  <div id="topBar">
    <div id="logo">🥚 CHICKEN ROAD</div>
    <div id="balanceBox"><span id="balance">0</span><span>$</span></div>
    <div id="rightIcons">
      <div id="adminPanelBtn" onclick="openAdminPanel()">👑 Admin</div>
      <div id="menuBtn" onclick="openProfile()">☰</div>
    </div>
  </div>

  <div id="liveBar">
    <span>Live wins:</span>
    <span id="liveDot"></span>
    <span>Online: <span id="onlineCount">2701</span></span>
  </div>

  <div id="gameArea">
    <div id="player">🐔</div>
  </div>

  <div id="panel">
    <div id="betRange">
      <span>MIN</span>
      <span class="center" id="currentBet">3</span>
      <span>MAX</span>
    </div>

    <div id="betQuick">
      <button class="betBtn" onclick="setBet(2)">2 <span>$</span></button>
      <button class="betBtn" onclick="setBet(3)">3 <span>$</span></button>
      <button class="betBtn" onclick="setBet(8)">8 <span>$</span></button>
      <button class="betBtn" onclick="setBet(20)">20 <span>$</span></button>
    </div>

    <div id="actionBtns">
      <button id="cashBtn" disabled>
        CASH OUT<br>
        <span id="cashAmount">0 USD</span>
      </button>
      <button id="goBtn">GO</button>
    </div>
  </div>
</div>

<div id="profilePanel">
  <div class="authBox">
    <h2 style="margin-bottom:15px;">Profile</h2>
    <p style="margin-bottom:10px;"><strong>Name:</strong> <span id="profileName">Player</span></p>
    <p style="margin-bottom:20px;"><strong>ID:</strong> <span id="userID">------</span></p>
    <button class="btn" onclick="closePanel('profilePanel')" style="background:#6c757d;">Close</button>
    <button class="btn" id="logoutBtn" style="background:#dc3545;">Logout</button>
  </div>
</div>

<div id="adminPanel">
  <div class="adminBox">
    <div class="adminTitle">👑 لوحة الأدمن</div>

    <div class="adminSection">
      <h3>💸 إرسال كوينز</h3>
      <input id="sendToID" type="text" placeholder="ID اللاعب" style="text-transform:uppercase;">
      <input id="sendAmount" type="number" placeholder="عدد الكوينز" min="1">
      <button class="btn" onclick="sendCoins()" style="background:#00d4aa;">إرسال</button>
      <div id="sendStatus" style="margin-top:10px; text-align:center;"></div>
    </div>

    <button class="btn" onclick="closePanel('adminPanel')" style="background:#6c757d;">إغلاق</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, GoogleAuthProvider, signInWithRedirect } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, query, where, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7nexX-dwj_IhYC5EaS-DU_YQeE6-acDw",
  authDomain: "game-af286.firebaseapp.com",
  projectId: "game-af286",
  storageBucket: "game-af286.firebasestorage.app",
  messagingSenderId: "567693078252",
  appId: "1:567693078252:web:3b5d6475a583f1f7347fc9",
  measurementId: "G-JKFYDGCFML"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

const ADMIN_UID = "sPQ9h5s5pQYONHz0eTuhet8jKq82";

let currentUser = null;
let userData = { coins: 0, shortID: '' };
let bet = 3, multiplier = 1, running = false, currentStep = 0;

function generateShortID() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let result = '';
  for (let i = 0; i < 8; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

const multiplierPositions = [
  {color: 'green', mult: 1.03},
  {color: 'purple', mult: 1.07},
  {color: 'purple', mult: 1.15},
  {color: 'purple', mult: 1.25},
  {color: 'purple', mult: 1.4},
  {color: 'purple', mult: 1.6},
  {color: 'purple', mult: 1.85},
  {color: 'purple', mult: 2.1},
  {color: 'purple', mult: 2.5},
  {color: 'purple', mult: 3.0},
  {color: 'purple', mult: 3.8},
  {color: 'purple', mult: 4.8},
  {color: 'purple', mult: 6.2},
  {color: 'purple', mult: 8.5},
  {color: 'portal', mult: 'portal'}
];

function renderMultipliers() {
  const gameArea = document.getElementById('gameArea');
  gameArea.innerHTML = '<div id="player">🐔</div>';

  multiplierPositions.forEach((pos, i) => {
    const div = document.createElement('div');
    div.className = `multiplier ${pos.color}`;
    div.style.marginLeft = '30px';

    if(pos.mult === 'portal') {
      div.innerHTML = '<div class="portal-egg">🥚</div>';
    } else {
      div.innerText = pos.mult + 'x';
    }

    div.id = 'mult' + i;
    gameArea.appendChild(div);
  });
}
renderMultipliers();

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'flex';

    if (user.uid === ADMIN_UID) {
      document.getElementById('adminPanelBtn').style.display = 'block';
    }

    await loadUserData();
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('gameScreen').style.display = 'none';
  }
});

window.toggleForm = function() {
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');
  loginForm.style.display = loginForm.style.display === 'none'? 'block' : 'none';
  signupForm.style.display = signupForm.style.display === 'none'? 'block' : 'none';
}

async function login() {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  try { await signInWithEmailAndPassword(auth, email, pass); }
  catch (e) { alert(e.message); }
}

async function signup() {
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const pass = document.getElementById('signupPass').value;
  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
    await updateProfile(userCred.user, { displayName: name });

    let shortID;
    let exists = true;
    while (exists) {
      shortID = generateShortID();
      const q = query(collection(db, "users"), where("shortID", "==", shortID));
      const snap = await getDocs(q);
      exists =!snap.empty;
    }

    await setDoc(doc(db, "users", userCred.user.uid), {
      email: email,
      coins: 0,
      shortID: shortID,
      displayName: name
    });

    alert("تم إنشاء الحساب! ID بتاعك: " + shortID);
  } catch (e) { alert(e.message); }
}

async function signInWithGoogle() {
  await signInWithRedirect(auth, provider);
}

async function loadUserData() {
  if (!currentUser) return;
  const userDoc = await getDoc(doc(db, "users", currentUser.uid));
  if (userDoc.exists()) {
    userData = userDoc.data();
    updateBalance();
    document.getElementById('userID').innerText = userData.shortID || '------';
    document.getElementById('profileName').innerText = userData.displayName || currentUser.displayName || 'Player';
  }
}

window.sendCoins = async function() {
  const targetID = document.getElementById('sendToID').value.trim().toUpperCase();
  const amount = parseInt(document.getElementById('sendAmount').value);
  const statusDiv = document.getElementById('sendStatus');

  if (!targetID ||!amount || amount < 1) {
    statusDiv.innerText = "❌ اكتب ID والمبلغ صح";
    statusDiv.style.color = "#ff4757";
    return;
  }

  try {
    const q = query(collection(db, "users"), where("shortID", "==", targetID));
    const snap = await getDocs(q);

    if (snap.empty) {
      statusDiv.innerText = "❌ ID غير موجود";
      statusDiv.style.color = "#ff4757";
      return;
    }

    const targetDoc = snap.docs[0];
    await updateDoc(doc(db, "users", targetDoc.id), {
      coins: increment(amount)
    });

    statusDiv.innerText = `✅ تم إرسال ${amount} كوينز لـ ${targetID}`;
    statusDiv.style.color = "#00ff88";
    document.getElementById('sendToID').value = '';
    document.getElementById('sendAmount').value = '';

  } catch (e) {
    statusDiv.innerText = "❌ حصل خطأ: " + e.message;
    statusDiv.style.color = "#ff4757";
  }
}

window.setBet = function(amount) {
  bet = amount;
  document.getElementById('currentBet').innerText = amount;
}

window.startGame = function() {
  if (running) {
    moveChicken();
    return;
  }

  if (bet > userData.coins) {
    alert("Not enough coins!");
    return;
  }

  userData.coins -= bet;
  updateDoc(doc(db, "users", currentUser.uid), { coins: userData.coins });
  updateBalance();

  running = true;
  currentStep = 0;
  multiplier = 1;
  document.getElementById('goBtn').innerText = 'NEXT';
  document.getElementById('cashBtn').disabled = false;
  moveChicken();
}

function moveChicken() {
  if (currentStep >= multiplierPositions.length) {
    cashOut();
    return;
  }

  const step = multiplierPositions[currentStep];
  multiplier = step.mult === 'portal'? multiplier : step.mult;

  const newLeft = 50 + (currentStep + 1) * 115;
  document.getElementById('player').style.left = newLeft + 'px';

  document.getElementById('gameArea').scrollTo({
    left: newLeft - 200,
    behavior: 'smooth'
  });

  document.querySelectorAll('.multiplier').forEach(m => m.classList.remove('active'));
  document.getElementById('mult' + currentStep).classList.add('active');

  if (step.mult!== 'portal') {
    document.getElementById('cashAmount').innerText = Math.floor(bet * multiplier) + ' USD';
  }

  if (Math.random() < 0.12) {
    running = false;
    setTimeout(() => {
      alert('You lost!');
      resetGame();
    }, 500);
    return;
  }

  currentStep++;

  if (step.mult === 'portal') {
    setTimeout(() => {
      cashOut();
    }, 600);
  }
}

function cashOut() {
  if (!running && currentStep < multiplierPositions.length) return;
  running = false;
  const winAmount = Math.floor(bet * multiplier);
  userData.coins += winAmount;
  updateDoc(doc(db, "users", currentUser.uid), { coins: userData.coins });
  updateBalance();
  alert('You won ' + winAmount + ' coins! 🥚');
  resetGame();
}

function resetGame() {
  running = false;
  currentStep = 0;
  document.getElementById('player').style.left = '50px';
  document.getElementById('gameArea').scrollTo({left: 0, behavior: 'smooth'});
  document.getElementById('goBtn').innerText = 'GO';
  document.getElementById('cashBtn').disabled = true;
  document.getElementById('cashAmount').innerText = '0 USD';
  document.querySelectorAll('.multiplier').forEach(m => m.classList.remove('active'));
}

function updateBalance() {
  document.getElementById('balance').innerText = userData.coins.toLocaleString();
}

window.openProfile = function() {
  document.getElementById('profilePanel').style.display = 'flex';
}

window.openAdminPanel = function() {
  document.getElementById('adminPanel').style.display = 'flex';
}

window.closePanel = function(id) {
  document.getElementById(id).style.display = 'none';
}

window.logout = async function() {
  await signOut(auth);
}

document.getElementById('loginBtn').onclick = login;
document.getElementById('signupBtn').onclick = signup;
document.getElementById('googleBtn').onclick = signInWithGoogle;
document.getElementById('logoutBtn').onclick = logout;
document.getElementById('goBtn').onclick = startGame;
document.getElementById('cashBtn').onclick = cashOut;

setInterval(() => {
  document.getElementById('onlineCount').innerText = 2700 + Math.floor(Math.random() * 100);
}, 5000);
</script>
</body>
</html>
