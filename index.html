        justify-content: center;

        border-radius: 20px;
        border: 2px solid #00d4aa;
        box-shadow: 0 0 30px rgba(0,212,170,0.3);
        max-width: 400px;
    }
    .icon {
        width: 70px;
        height: 70px;
        margin: 0 auto 15px;
    }
    .icon svg {
        width: 100%;
        height: 100%;
        fill: #00d4aa;
    }
    h1 {
        font-size: 28px;
        color: #ffd700;
        margin-bottom: 10px;
    }
    p {
        font-size: 16px;
        color: #8b8ea3;
        line-height: 1.6;
    }
