<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>لوحة الادمن</title>
<style>
body{background:#0a0a0a;color:white;font-family:Cairo;padding:20px}
h1{color:#ff4444}
.tabs button{padding:10px 20px;background:#222;border:none;color:white;cursor:pointer;margin:5px;border-radius:8px}
.tabs button.active{background:#ff4444}
.card{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:10px;border-left:4px solid orange;position:relative}
.btn{padding:8px 15px;background:#00ff88;color:#000;border:none;border-radius:8px;cursor:pointer;margin:3px;font-weight:bold;font-size:12px}
.btn.red{background:#ff4444;color:white}
.btn.blue{background:#00aaff;color:white}
.btn.gray{background:#555;color:white}
.btn.purple{background:#9c27b0;color:white}
.btn.orange{background:#ff9500;color:white}
.btn.darkred{background:#8B0000;color:white}
.btn.green{background:#00ff88;color:#000}
img{max-width:200px;border-radius:10px;margin-top:10px}
input,textarea{padding:10px;border-radius:5px;border:1px solid #333;background:#222;color:white;width:100%;margin:5px 0}
input[type="number"]{width:70px}
.setting-box{background:#141414;padding:20px;border-radius:10px;margin:20px 0;border:1px solid #333}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin:20px 0}
.stat-card{background:#141414;padding:20px;border-radius:12px;text-align:center;border:2px solid #333}
.stat-card h3{color:#ffb800;margin-bottom:10px}
.stat-card p{font-size:32px;font-weight:bold;color:#00ff88}

/* مودال */
.modal-del{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:9999}
.modal-del-content{background:#141414;padding:30px;border-radius:15px;width:90%;max-width:400px;border:2px solid #ff4444;text-align:center}
.modal-del-content h2{color:#ff4444;margin-bottom:15px}
.modal-btns{display:flex;gap:10px;justify-content:center}

/* Toast */
#toast{position:fixed;bottom:20px;right:20px;background:#00ff88;color:#000;padding:15px 25px;border-radius:10px;font-weight:bold;display:none;z-index:10000;animation:slideIn 0.3s}
#toast.error{background:#ff4444;color:white}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.login-box{background:#141414;padding:30px;border-radius:15px;max-width:400px;margin:100px auto;border:1px solid #333;text-align:center}

/* الحسابات */
.user-card{background:#1a1a1a;padding:15px;border-radius:10px;margin:10px 0;border-left:4px solid #00aaff}
.user-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.online-dot{width:10px;height:10px;background:#00ff88;border-radius:50%;display:inline-block;margin-left:5px}
.offline-dot{width:10px;height:10px;background:#555;border-radius:50%;display:inline-block;margin-left:5px}
.banned{border-left-color:#ff4444!important}
.search-box{display:flex;gap:10px;margin-bottom:15px}

/* طلبات الموزعين */
.dist-request{background:#1a1a1a;padding:20px;border-radius:12px;margin-bottom:15px;border-left:4px solid #ffb800}
.dist-request p{margin:5px 0;color:#ccc}

/* كروت الموزعين الجديدة */
.dist-card{background:linear-gradient(135deg,#1a1a1a 0%,#242424 100%);padding:20px;border-radius:15px;margin-bottom:15px;border:2px solid #333;transition:0.3s}
.dist-card:hover{border-color:#00ff88;transform:translateY(-2px)}
.dist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:15px}
.dist-info p{margin:4px 0;font-size:14px}
.dist-badge{background:#00ff88;color:#000;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:bold}
.dist-actions{display:flex;gap:8px;flex-wrap:wrap}
.dist-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid #333}
.dist-stat{text-align:center}
.dist-stat h4{color:#ffb800;font-size:11px;margin-bottom:3px}
.dist-stat p{font-size:16px;font-weight:bold;color:#00ff88}

/* بوستات المسابقات */
.contest-post{background:#242526;padding:15px;border-radius:10px;margin-bottom:15px;border:1px solid #3a3b3c}
.post-box-admin{background:#1a1a1a;padding:20px;border-radius:12px;margin-bottom:20px;border:2px solid #9c27b0}
.post-header{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.post-header img{width:40px;height:40px;border-radius:50%;border:2px solid #ffb800}
.badge-verified{background:#1877f2;padding:2px 6px;border-radius:4px;font-size:11px}
</style>
</head><body>
<div id="app">جاري التحميل...</div>
<div id="toast"></div>

<div class="modal-del" id="deleteModal">
  <div class="modal-del-content">
    <h2>⚠️ تأكيد الحذف</h2>
    <p id="deleteText">هل انت متأكد؟</p>
    <div class="modal-btns">
      <button class="btn red" id="confirmDeleteBtn">🗑️ نعم</button>
      <button class="btn gray" onclick="closeDeleteModal()">الغاء</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence, signInWithEmailAndPassword, signOut, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy, where, getDoc, setDoc, deleteDoc, getDocs, writeBatch, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {apiKey: "AIzaSyC7nexX-dwj_IhYC5EaS-DU_YQeE6-acDw",authDomain: "game-af286.firebaseapp.com",projectId: "game-af286",storageBucket: "game-af286.firebasestorage.app",messagingSenderId: "567693078252",appId: "1:567693078252:web:3b5d6475a583f1f7347fc9"};
const app=initializeApp(firebaseConfig); const db=getFirestore(app); const auth=getAuth(app);
await setPersistence(auth, browserLocalPersistence);
const ADMIN_EMAIL = "alaaahmedsayd16@gmail.com";
const SITE_LOGO = "https://k.top4top.io/p_3839dix1p0.png";
const ADMIN_NAME = "ESh7NLI CASH";
let deleteAction = null;
let onlineUsers = new Set();
let allUsersData = [];
let uploadedContestImage = "";

function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.innerText=msg;
  t.className = type=='error'? 'error' : '';
  t.style.display='block';
  setTimeout(()=>t.style.display='none',3000)
}

// تتبع الاونلاين
onAuthStateChanged(auth, async user => {
  if(user){
    await updateDoc(doc(db,"users",user.uid),{lastSeen: new Date()});
    const interval = setInterval(async ()=>{
      if(auth.currentUser) await updateDoc(doc(db,"users",user.uid),{lastSeen: new Date()});
      else clearInterval(interval);
    }, 30000);
  }
});

onAuthStateChanged(auth, async user => {
  const appDiv = document.getElementById('app');
  if(!user) {
    appDiv.innerHTML = `<div class="login-box"><h1>🔐 تسجيل دخول الادمن</h1><input type="email" id="adminEmail" placeholder="ايميل الادمن" value="${ADMIN_EMAIL}"><input type="password" id="adminPass" placeholder="كلمة السر"><button class="btn" onclick="adminLogin()">دخول</button></div>`;
    return;
  }
  const userDoc = await getDoc(doc(db,"users",user.uid));
  const isAdmin = user.email === ADMIN_EMAIL || userDoc.data()?.role === 'admin';
  if(!isAdmin) {
    appDiv.innerHTML = `<div class="login-box"><h1>⛔ انت مش الادمن</h1><p>${user.email}</p><button class="btn red" onclick="logout()">خروج</button></div>`;
    return;
  }
  loadAdminPanel();
});

function loadAdminPanel(){
  document.getElementById('app').innerHTML = `
  <h1>📊 لوحة تحكم الادمن</h1>
  <button class="btn red" onclick="logout()" style="float:left">تسجيل خروج</button>
  <div class="tabs">
    <button class="active" onclick="showTab('orders')">الطلبات</button>
    <button onclick="showTab('distRequests')">📝 طلبات الموزعين</button>
    <button onclick="showTab('distManage')">👑 ادارة الموزعين</button>
    <button onclick="showTab('users')">👥 الحسابات</button>
    <button onclick="showTab('contests')">🎁 المسابقات والجوائز</button>
    <button onclick="showTab('settings')">⚙️ الاعدادات</button>
  </div>
  <div id="orders"></div>
  <div id="distRequests" style="display:none"></div>
  <div id="distManage" style="display:none"></div>
  <div id="users" style="display:none"></div>
  <div id="contests" style="display:none"></div>
  <div id="settings" style="display:none"></div>
  `;
  loadOrders(); loadDistRequests(); loadDistManage(); loadAllUsers(); loadContests(); loadSettings();
}

// 1- تاب طلبات الموزعين: قبول ورفض
function loadDistRequests(){
  onSnapshot(query(collection(db,"distributor_requests"), where("status","==","pending")), (snap)=>{
    let html = '<h2>طلبات الموزعين المعلقة</h2>';
    if(snap.empty){html += '<p style="color:#aaa">مفيش طلبات جديدة</p>';}
    snap.forEach(d=>{
      const o = d.data();
      html += `
      <div class="dist-request">
        <p><b>الاسم:</b> ${o.name}</p>
        <p><b>الايميل:</b> ${o.email}</p>
        <p><b>الواتساب:</b> ${o.phone}</p>
        <p><b>الخبرة:</b> ${o.exp || 'لا يوجد'}</p>
        <p><b>تاريخ الطلب:</b> ${o.createdAt?.toDate().toLocaleString('ar-EG')}</p>
        <div style="margin-top:10px">
          <input type="number" id="disc_${d.id}" value="15" placeholder="نسبة الخصم %" style="width:120px">
          <button class="btn green" onclick="approveDist('${d.id}','${o.uid}')">✅ قبول</button>
          <button class="btn red" onclick="rejectDist('${d.id}')">❌ رفض</button>
        </div>
      </div>`;
    });
    document.getElementById('distRequests').innerHTML = html;
  });
}

window.approveDist = async (id, uid)=>{
  const discount = document.getElementById(`disc_${id}`).value;
  await updateDoc(doc(db,"distributor_requests",id),{status:'approved'});
  await updateDoc(doc(db,"users",uid),{role:'distributor', discount:Number(discount)});
  showToast('✅ تم قبول الموزع');
}

window.rejectDist = async (id)=>{
  await updateDoc(doc(db,"distributor_requests",id),{status:'rejected'});
  showToast('❌ تم رفض الطلب');
}

// 2- تاب ادارة الموزعين: التحكم الكامل
async function loadDistManage(){
  const usersSnap = await getDocs(query(collection(db,"users"), where("role","==","distributor")));
  let html = '<h2>👑 ادارة الموزعين</h2>';
  if(usersSnap.empty){html += '<p style="color:#aaa">مفيش موزعين</p>';}

  usersSnap.forEach(d=>{
    let u = d.data();
    let isDisabled = u.disabled;
    let lastSeen = u.lastSeen? u.lastSeen.toDate().toLocaleString('ar-EG') : 'غير معروف';

    html += `
    <div class="dist-card ${isDisabled?'banned':''}">
      <div class="dist-header">
        <div class="dist-info">
          <h3>${u.name} <span class="${isOnline(u.lastSeen)?'online-dot':'offline-dot'}"></span></h3>
          <p>📧 ${u.email}</p>
          <p>📱 ${u.phone || 'لا يوجد'}</p>
          <p>🕒 اخر ظهور: ${lastSeen}</p>
        </div>
        <span class="dist-badge">خصم ${u.discount||0}%</span>
      </div>

      <div class="dist-stats">
        <div class="dist-stat">
          <h4>الحالة</h4>
          <p>${isDisabled?'⛔ موقف':'✅ شغال'}</p>
        </div>
        <div class="dist-stat">
          <h4>الخصم الحالي</h4>
          <p>${u.discount||0}%</p>
        </div>
        <div class="dist-stat">
          <h4>النوع</h4>
          <p>موزع</p>
        </div>
      </div>

      <div class="dist-actions">
        <button class="btn purple" onclick="editDiscount('${d.id}',${u.discount||0})">💰 تعديل الخصم</button>
        <button class="btn ${isDisabled?'green':'gray'}" onclick="toggleDisableDist('${d.id}',${isDisabled})">${isDisabled?'تشغيل':'ايقاف'}</button>
        <button class="btn red" onclick="removeDistributor('${d.id}','${u.name}')">❌ مسح الموزع</button>
      </div>
    </div>`;
  });
  document.getElementById('distManage').innerHTML = html;
}

function isOnline(timestamp){
  if(!timestamp) return false;
  return (new Date() - timestamp.toDate()) < 60000;
}

window.editDiscount = async (uid, oldDiscount)=>{
  let newDiscount = prompt("نسبة الخصم الجديدة %:", oldDiscount);
  if(newDiscount!== null &&!isNaN(newDiscount)){
    await updateDoc(doc(db,"users",uid),{discount:Number(newDiscount)});
    showToast(`✅ تم تعديل الخصم الى ${newDiscount}%`);
    loadDistManage();
  }
}

window.removeDistributor = async (uid, name)=>{
  if(confirm(`هل متأكد انك عايز تشيل دور الموزع من ${name}؟`)){
    await updateDoc(doc(db,"users",uid),{role:'user', discount:0});
    showToast(`✅ تم مسح الموزع ${name}`);
    loadDistManage();
  }
}

window.toggleDisableDist = async (uid, state)=>{
  await updateDoc(doc(db,"users",uid),{disabled:!state});
  showToast(state?'✅ تم تشغيل الموزع':'⛔ تم ايقاف الموزع');
  loadDistManage();
}

// 3- الحسابات + الحظر
async function loadAllUsers(){
  const usersSnap = await getDocs(collection(db,"users"));
  allUsersData = []; let distCount = 0; onlineUsers.clear();

  usersSnap.forEach(d=>{
    let u = d.data(); u.id = d.id; allUsersData.push(u);
    let isOnline = u.lastSeen && (new Date() - u.lastSeen.toDate()) < 60000;
    if(isOnline) onlineUsers.add(d.id);
    if(u.role==='distributor') distCount++;
  });

  let html = `
  <div class="stats">
    <div class="stat-card"><h3>اجمالي الحسابات</h3><p>${usersSnap.size}</p></div>
    <div class="stat-card"><h3>المتصلين الان</h3><p>${onlineUsers.size}</p></div>
    <div class="stat-card"><h3>الموزعين</h3><p>${distCount}</p></div>
    <div class="stat-card"><h3>طلبات معلقة</h3><p id="pendingDist">0</p></div>
  </div>
  <div class="search-box">
    <input type="text" id="userSearch" placeholder="🔍 ابحث بالاسم او الايميل" onkeyup="searchUsers()">
    <button class="btn darkred" onclick="openDeleteModal('deleteAll','all','كل الحسابات')">🗑️ مسح الكل</button>
  </div>
  <div id="usersList"></div>`;

  document.getElementById('users').innerHTML = html;
  renderUsersList(allUsersData);

  const pendingSnap = await getDocs(query(collection(db,"distributor_requests"), where("status","==","pending")));
  document.getElementById('pendingDist').innerText = pendingSnap.size;
}

window.searchUsers = ()=>{
  let search = document.getElementById('userSearch').value.toLowerCase();
  let filtered = allUsersData.filter(u => u.name?.toLowerCase().includes(search) || u.email?.toLowerCase().includes(search));
  renderUsersList(filtered);
}

function renderUsersList(users){
  let html = '';
  users.forEach(u=>{
    let isOnline = u.lastSeen && (new Date() - u.lastSeen.toDate()) < 60000;
    let isBanned = u.banUntil && u.banUntil.toDate() > new Date();
    let isDisabled = u.disabled;
    let banDate = isBanned? u.banUntil.toDate().toLocaleString('ar-EG') : '';

    html += `
    <div class="user-card ${isBanned||isDisabled?'banned':''}">
      <div class="user-header">
        <div>
          <b id="name_${u.id}">${u.name}</b>
          <span class="${isOnline?'online-dot':'offline-dot'}"></span>
          ${u.role==='admin'?'<span style="background:#ff4444;padding:2px 6px;border-radius:4px;font-size:11px">ADMIN</span>':''}
          ${u.role==='distributor'?'<span style="background:#00ff88;color:#000;padding:2px 6px;border-radius:4px;font-size:11px">موزع</span>':''}
          ${isBanned?`<span style="background:#ff4444;padding:2px 6px;border-radius:4px;font-size:11px">محظور حتى ${banDate}</span>`:''}
          ${isDisabled?'<span style="background:#555;padding:2px 6px;border-radius:4px;font-size:11px">موقف نهائي</span>':''}
        </div>
        <div>
          <button class="btn orange" onclick="editName('${u.id}','${u.name}')">✏️ اسم</button>
          <button class="btn blue" onclick="resetPass('${u.email}')">📧 باسورد</button>
          <button class="btn ${isDisabled?'green':'gray'}" onclick="toggleDisable('${u.id}',${isDisabled})">${isDisabled?'فك الايقاف':'ايقاف نهائي'}</button>
          <input type="number" id="ban_${u.id}" placeholder="ساعات" style="width:60px">
          <button class="btn red" onclick="banUser('${u.id}',document.getElementById('ban_${u.id}').value)">🚫 حظر مؤقت</button>
          <button class="btn ${isBanned?'green':'red'}" onclick="unbanUser('${u.id}')">${isBanned?'فك الحظر':'حذف الحظر'}</button>
          <button class="btn red" onclick="openDeleteModal('userFull','${u.id}','${u.name}')">🗑️ مسح</button>
        </div>
      </div>
      <p style="font-size:12px;color:#aaa;margin-top:8px">الايميل: ${u.email} | UID: ${u.id}</p>
    </div>`;
  });
  document.getElementById('usersList').innerHTML = html || '<p>مفيش نتائج</p>';
}

// فنكشنز الحسابات + الحظر
window.editName = async (uid, oldName)=>{
  let newName = prompt("الاسم الجديد:", oldName);
  if(newName) {await updateDoc(doc(db,"users",uid),{name:newName}); showToast('✅ تم تغيير الاسم'); loadAllUsers();}
}
window.resetPass = async (email)=>{await sendPasswordResetEmail(auth,email); showToast('📧 تم ارسال رابط تغيير الباسورد');}
window.toggleDisable = async (uid, state)=>{await updateDoc(doc(db,"users",uid),{disabled:!state}); showToast(state?'✅ تم فك الايقاف':'⛔ تم الايقاف النهائي'); loadAllUsers();}
window.banUser = async (uid, hours)=>{
  if(!hours) return showToast('اكتب عدد الساعات','error');
  let banUntil = new Date(); banUntil.setHours(banUntil.getHours() + Number(hours));
  await updateDoc(doc(db,"users",uid),{banUntil: banUntil});
  showToast(`✅ تم حظر المستخدم ${hours} ساعة`); loadAllUsers();
}
window.unbanUser = async (uid)=>{await updateDoc(doc(db,"users",uid),{banUntil: null}); showToast('✅ تم فك الحظر'); loadAllUsers();}
window.deleteAllUsers = async ()=>{
  const batch = writeBatch(db);
  const usersSnap = await getDocs(collection(db,"users"));
  usersSnap.forEach(d=>{if(d.data().email!== ADMIN_EMAIL){batch.delete(doc(db,"users",d.id));}});
  await batch.commit(); showToast('✅ تم مسح كل الحسابات'); loadAllUsers();
}

// 4- المسابقات والجوائز
function loadContests(){
  document.getElementById('contests').innerHTML = `
  <div class="post-box-admin">
    <h2>📢 نشر مسابقة جديدة</h2>
    <textarea id="contestText" placeholder="اكتب نص المسابقة..." rows="3"></textarea>
    <input type="file" id="contestImage" accept="image/*" onchange="previewContestImg(event)">
    <img id="contestImgPreview" style="display:none;max-width:300px">
    <button class="btn purple" onclick="addContestPost()">نشر البوست</button>
  </div>
  <h3>كل البوستات:</h3>
  <div id="contestList"></div>`;

  onSnapshot(query(collection(db,"contest_posts"),orderBy("createdAt","desc")),(snap)=>{
    let html='';
    snap.forEach(d=>{
      let p=d.data();
      html+=`
      <div class="contest-post">
        <div class="post-header">
          <img src="${SITE_LOGO}">
          <div><b>${ADMIN_NAME}</b> <span class="badge-verified">✅ موثق</span></div>
        </div>
        <p style="white-space:pre-line;margin:10px 0">${p.text}</p>
        ${p.image?`<img src="${p.image}">`:''}
        <br><button class="btn red" onclick="openDeleteModal('contest','${d.id}','البوست')">🗑️ مسح</button>
      </div>`;
    });
    document.getElementById('contestList').innerHTML=html||'مفيش بوستات';
  });
}

window.previewContestImg = (e)=>{
  let reader = new FileReader();
  reader.onload = function(){uploadedContestImage = reader.result; document.getElementById('contestImgPreview').src = uploadedContestImage; document.getElementById('contestImgPreview').style.display='block';}
  reader.readAsDataURL(e.target.files[0]);
}

window.addContestPost = async ()=>{
  let text = document.getElementById("contestText").value;
  if(text.trim() == "" && uploadedContestImage == "") return showToast("اكتب نص او ارفع صورة",'error');
  await addDoc(collection(db,"contest_posts"),{
    uid: auth.currentUser.uid, name: ADMIN_NAME, role: "admin", logo: SITE_LOGO,
    text: text, image: uploadedContestImage, createdAt: serverTimestamp()
  });
  document.getElementById("contestText").value = ""; document.getElementById("contestImgPreview").style.display='none'; uploadedContestImage="";
  showToast("✅ تم النشر");
}

// 5- باقي الفنكشنز + الاعدادات
function loadOrders(){onSnapshot(query(collection(db,"orders"),orderBy("createdAt","desc")),(snap)=>{let html='';snap.forEach(d=>{const o=d.data();html+=`<div class="card"><b>${o.game}</b><br>${o.email}<br>${o.package.name} - ${o.package.price}ج<br><button class="btn" onclick="upd('${d.id}','done')">✅ تم</button><button class="btn red" onclick="upd('${d.id}','cancelled')">❌ رفض</button></div>`});document.getElementById('orders').innerHTML=html;});}

function loadSettings(){
  getDoc(doc(db,"settings","marquee")).then(snap=>{if(snap.exists()) document.getElementById('marqueeInput').value = snap.data().text;});
  getDoc(doc(db,"settings","global_notification")).then(snap=>{if(snap.exists()) document.getElementById('globalNotifInput').value = snap.data().text;});

  document.getElementById('settings').innerHTML = `
  <div class="setting-box">
    <h2>🎁 التحكم في الشريط المتحرك</h2>
    <input type="text" id="marqueeInput" placeholder="اكتب العرض هنا">
    <button class="btn" onclick="saveMarquee()">حفظ الشريط</button>
  </div>
  <div class="setting-box">
    <h2>📢 اشعار للكل</h2>
    <p>ده هيظهر لكل الناس فوق في صندوق</p>
    <textarea id="globalNotifInput" rows="3" placeholder="اكتب الاشعار هنا"></textarea>
    <button class="btn" onclick="saveGlobalNotif()">نشر الاشعار</button>
  </div>
  `;
}

window.upd=async(id,s)=>{await updateDoc(doc(db,"orders",id),{status:s});showToast('تم التحديث');}

window.openDeleteModal=(type,id,text)=>{
  document.getElementById('deleteText').innerText=`هل متأكد من مسح: ${text}؟`;
  document.getElementById('deleteModal').style.display='flex';
  if(type=='userFull') deleteAction=()=>deleteUserFull(id);
  if(type=='contest') deleteAction=()=>deleteDoc(doc(db,"contest_posts",id));
  if(type=='deleteAll') deleteAction=()=>deleteAllUsers();
  document.getElementById('confirmDeleteBtn').onclick=async()=>{await deleteAction();closeDeleteModal();loadAllUsers();loadDistManage();}
}
window.closeDeleteModal=()=>{document.getElementById('deleteModal').style.display='none';}
window.deleteUserFull=async(uid)=>{await deleteDoc(doc(db,"users",uid));showToast('✅ تم مسح الحساب');loadAllUsers();}
window.saveMarquee=async()=>{await setDoc(doc(db,"settings","marquee"),{text:document.getElementById('marqueeInput').value});showToast('تم حفظ الشريط');}
window.saveGlobalNotif=async()=>{await setDoc(doc(db,"settings","global_notification"),{text:document.getElementById('globalNotifInput').value});showToast('تم نشر الاشعار');}
window.showTab=(t)=>{document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');['orders','distRequests','distManage','users','contests','settings'].forEach(id=>document.getElementById(id).style.display=id==t?'block':'none');}
window.adminLogin=async()=>{try{await signInWithEmailAndPassword(auth,document.getElementById('adminEmail').value,document.getElementById('adminPass').value);showToast('تم الدخول');}catch(e){showToast('بيانات غلط','error');}}
window.logout=()=>signOut(auth);
</script></body></html>
