<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Room</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
:root{
    --bg:#0f0f14; --card:#1a1a22; --primary:#7c3aed; --primary-light:#a78bfa;
    --accent:#fbbf24; --danger:#ef4444; --success:#22c55e; --text:#ffffff; --text-dim:#9ca3af;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden}
.loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.loading-spinner{width:50px;height:50px;border:3px solid #2a2a35;border-top:3px solid var(--primary);
    border-radius:50%;animation:spin 1s infinite;margin-bottom:15px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
.home-screen,.room-screen{display:none;flex-direction:column;height:100vh}
.home-screen.active,.room-screen.active{display:flex}
.top-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));
    padding:15px 20px;padding-top:45px}
.header-top{display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:800}
.rooms-list{flex:1;overflow-y:auto;padding:20px;padding-bottom:90px}
.room-item{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px;
    display:flex;gap:14px;align-items:center;cursor:pointer;border:1px solid #2a2a35}
.room-avatar{width:65px;height:65px;border-radius:14px;object-fit:cover;border:2px solid var(--primary)}
.room-info{flex:1}
.room-name{font-weight:800;font-size:16px;margin-bottom:4px}
.room-desc{font-size:13px;color:var(--text-dim)}
.no-rooms{text-align:center;color:var(--text-dim);margin-top:80px;font-size:15px}
.room-screen{background:linear-gradient(180deg,#1a0f2e,#0f0f14,#1a0f2e)}
.room-header{padding:15px 20px;display:flex;align-items:center;gap:12px;
    background:rgba(0,0,0,0.3);backdrop-filter:blur(10px)}
.back-btn{font-size:26px;cursor:pointer;padding:5px}
.owner-info{display:flex;align-items:center;gap:12px;flex:1}
.owner-avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
.owner-name{font-weight:800;font-size:17px}
.seats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;padding:20px}
.seat{aspect-ratio:1;background:rgba(255,255,255,0.05);border-radius:50%;display:flex;
    align-items:center;justify-content:center;position:relative;cursor:pointer;border:2px solid transparent;transition:0.3s}
.seat.occupied{border-color:var(--accent);background:rgba(251,191,36,0.15)}
.seat.talking{border-color:var(--success);box-shadow:0 0 25px var(--success)}
.seat img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.seat-num{font-size:15px;font-weight:800;position:absolute}
.chat-box{margin:15px;background:rgba(0,0,0,0.4);border-radius:18px;height:190px;display:flex;
    flex-direction:column;border:1px solid #2a2a35}
.chat-messages{flex:1;overflow-y:auto;padding:12px;font-size:14px}
.chat-msg{margin-bottom:10px;padding:10px 14px;background:rgba(255,255,255,0.08);
    border-radius:12px;display:inline-block;max-width:85%}
.chat-msg.own{background:var(--primary);margin-left:auto;display:block}
.chat-input-area{display:flex;padding:12px;border-top:1px solid #2a2a35}
.chat-input{flex:1;background:rgba(255,255,255,0.08);border:none;border-radius:25px;
    padding:12px 18px;color:#fff;outline:none;font-size:14px}
.send-btn{margin-right:10px;padding:0 18px;background:var(--primary);border:none;
    border-radius:25px;color:#fff;font-weight:800;cursor:pointer}
.bottom-bar{background:rgba(0,0,0,0.5);padding:15px 20px;display:flex;justify-content:center;gap:20px}
.mic-btn{width:65px;height:65px;border-radius:50%;background:var(--success);
    display:flex;align-items:center;justify-content:center;font-size:30px;
    cursor:pointer;border:none}
.mic-btn.muted{background:var(--danger)}
.mic-btn:disabled{opacity:0.4;cursor:not-allowed}
.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--card);padding:28px;border-radius:24px;width:90%;max-width:380px}
.modal-content input{width:100%;padding:15px;background:var(--bg);border:1px solid #2a2a35;
    border-radius:14px;color:#fff;margin-bottom:15px;font-size:16px}
.modal-buttons{display:flex;gap:12px;flex-direction:column}
.modal-buttons button{padding:15px;border:none;border-radius:14px;font-weight:800;cursor:pointer}
.btn-cancel{background:#2a2a35;color:#fff}
.btn-create{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div style="font-weight:700">جاري التحميل...</div>
</div>

<div class="home-screen active" id="homeScreen">
    <div class="top-header">
        <div class="header-top">
            <div>الغرف الصوتية</div>
            <div onclick="createRoomModal()" style="font-size:28px;cursor:pointer">+</div>
        </div>
    </div>
    <div class="rooms-list" id="roomsList">
        <div id="roomsContainer">
            <div class="no-rooms">مفيش غرف لسه. اعمل غرفة جديدة</div>
        </div>
    </div>
</div>

<div class="room-screen" id="roomScreen">
    <div class="room-header">
        <div class="back-btn" onclick="exitRoom()">←</div>
        <div class="owner-info">
            <img class="owner-avatar" id="ownerAvatar" src="">
            <div class="owner-name" id="ownerName"></div>
        </div>
        <div id="roomName" style="font-weight:700"></div>
    </div>
    <div class="seats-grid" id="seatsGrid"></div>
    <div class="chat-box">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <button class="send-btn" onclick="sendMsg()">إرسال</button>
            <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة للكل...">
        </div>
    </div>
    <div class="bottom-bar">
        <button class="mic-btn" id="micBtn" disabled onclick="toggleMic()">🎤</button>
    </div>
</div>

<div class="modal" id="createModal">
    <div class="modal-content">
        <h3>إنشاء غرفة جديدة</h3>
        <input type="text" id="roomNameInput" placeholder="اسم الغرفة">
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
            <button class="btn-create" onclick="createRoom()">إنشاء</button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyC7nexX-dwj_IhYC5EaS-DU_YQeE6-acDw",
  authDomain: "game-af286.firebaseapp.com",
  projectId: "game-af286",
  storageBucket: "game-af286.firebasestorage.app",
  messagingSenderId: "567693078252",
  appId: "1:567693078252:web:3b5d6475a583f1f7347fc9"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let peer,myId,myName="أحمد",myPhoto="https://i.pravatar.cc/150?u="+Math.random();
let localStream;
let mySeat=null;
let rooms=[],myRoomId="";
let hasRoom=false,inRoom=false;
let roomOwner={name:"",photo:""};
let isMicOn=false;
let roomUnsubscribe=null, seatsUnsubscribe=null, chatUnsubscribe=null;
let connectedPeers={};

function init(){
    peer=new Peer();
    peer.on('open',id=>{
        myId=id;
        navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
            localStream=s;
            localStream.getAudioTracks()[0].enabled=false;
        }).catch(e=>console.log("Mic error:",e));
    });

    peer.on('call',call=>{
        call.answer(localStream);
        call.on('stream',stream=>{
            let audio=new Audio();
            audio.srcObject=stream;
            audio.play();
        });
    });

    db.collection('rooms').onSnapshot(snapshot => {
        rooms = [];
        snapshot.forEach(doc => rooms.push(doc.data()));
        updateRoomsList();
    });

    setTimeout(()=>{document.getElementById('loadingScreen').style.display='none';},1500);
}
init();

function updateRoomsList(){
    let container=document.getElementById('roomsContainer');
    if(rooms.length===0){
        container.innerHTML='<div class="no-rooms">مفيش غرف لسه. اعمل غرفة جديدة</div>';
        return;
    }
    container.innerHTML="";
    rooms.forEach(room=>{
        container.innerHTML+=`
        <div class="room-item" onclick="joinRoom('${room.id}')">
            <div class="room-info">
                <div class="room-name">${room.name}</div>
                <div class="room-desc">المضيف: ${room.owner} • ${room.users || 0} متصل</div>
            </div>
            <img class="room-avatar" src="${room.img}">
        </div>`;
    });
}

function createRoomModal(){
    if(hasRoom){alert('انت عامل غرفة بالفعل');return;}
    document.getElementById('createModal').classList.add('active');
}
function closeModal(){document.getElementById('createModal').classList.remove('active');}

function createRoom(){
    let roomName=document.getElementById('roomNameInput').value.trim();
    if(!roomName)return;
    myRoomId='room_'+Date.now();
    let roomData = {id:myRoomId, name:roomName, owner:myName, img:myPhoto, peerId: myId, users: 1};

    db.collection('rooms').doc(myRoomId).set(roomData);
    hasRoom=true;
    roomOwner={name:myName,photo:myPhoto};
    closeModal();
    enterRoom(myRoomId,roomName);
}

function joinRoom(roomId){
    let room=rooms.find(r=>r.id===roomId);
    if(room){
        roomOwner={name:room.owner,photo:room.img};
        enterRoom(roomId,room.name);

        db.collection('rooms').doc(roomId).update({
            users: firebase.firestore.FieldValue.increment(1)
        });
    }
}

function enterRoom(roomId,name){
    inRoom=true;
    myRoomId=roomId;
    document.getElementById('loadingScreen').style.display='flex';

    setTimeout(()=>{
        document.getElementById('loadingScreen').style.display='none';
        document.getElementById('homeScreen').classList.remove('active');
        document.getElementById('roomScreen').classList.add('active');
        document.getElementById('roomName').innerText=name;
        document.getElementById('ownerName').innerText=roomOwner.name;
        document.getElementById('ownerAvatar').src=roomOwner.photo;

        let grid=document.getElementById('seatsGrid');
        grid.innerHTML='';
        for(let i=0;i<8;i++){
            grid.innerHTML+=`<div class="seat" id="seat${i}" onclick="seatClick(${i})"><div class="seat-num">${i+1}</div></div>`;
        }

        // استمع للكراسي
        if(seatsUnsubscribe) seatsUnsubscribe();
        seatsUnsubscribe = db.collection('rooms').doc(roomId).collection('seats')
       .onSnapshot(snapshot => {
            let seatData={};
            snapshot.forEach(doc=>{
                seatData[doc.id]=doc.data();
                updateSeatUI(doc.id, true, doc.data().photo, doc.data().talking);
                connectToPeer(doc.data().peerId);
            });

            // امسح الكراسي الفاضية
            for(let i=0;i<8;i++){
                if(!seatData[i]){
                    updateSeatUI(i, false);
                }
            }
        });

        // استمع للشات
        if(chatUnsubscribe) chatUnsubscribe();
        chatUnsubscribe = db.collection('rooms').doc(roomId).collection('chat')
       .orderBy('time')
       .limit(50)
       .onSnapshot(snapshot=>{
            document.getElementById('chatMessages').innerHTML='';
            snapshot.forEach(doc=>{
                let data=doc.data();
                addChatMsg(data.name,data.msg,data.userId===myId);
            });
        });
    },1000);
}

function connectToPeer(peerId){
    if(!peerId || peerId===myId || connectedPeers[peerId]) return;

    connectedPeers[peerId]=true;

    let conn=peer.connect(peerId);
    conn.on('open',()=>{
        let call=peer.call(peerId,localStream);
        call.on('stream',stream=>{
            let audio=new Audio();
            audio.srcObject=stream;
            audio.play();
        });
    });
}

function seatClick(seatNum){
    if(mySeat===seatNum){
        leaveSeat();
        return;
    }

    db.collection('rooms').doc(myRoomId).collection('seats').doc(seatNum.toString()).get().then(doc=>{
        if(doc.exists && doc.data().userId!==myId){
            alert('المايك مشغول');
            return;
        }

        if(mySeat!==null){
            db.collection('rooms').doc(myRoomId).collection('seats').doc(mySeat.toString()).delete();
        }

        mySeat=seatNum;
        db.collection('rooms').doc(myRoomId).collection('seats').doc(seatNum.toString()).set({
            userId: myId,
            name: myName,
            photo: myPhoto,
            peerId: myId,
            talking: false
        });

        document.getElementById('micBtn').disabled=false;
    });
}

function leaveSeat(){
    if(mySeat===null)return;

    if(isMicOn){
        isMicOn=false;
        if(localStream)localStream.getAudioTracks()[0].enabled=false;
    }

    db.collection('rooms').doc(myRoomId).collection('seats').doc(mySeat.toString()).delete();
    mySeat=null;
    document.getElementById('micBtn').disabled=true;
    document.getElementById('micBtn').classList.remove('muted');
}

function updateSeatUI(seatNum, occupied, photo, talking){
    let seat=document.getElementById('seat'+seatNum);
    if(!seat) return;

    seat.classList.toggle('occupied',occupied);
    seat.classList.toggle('talking',talking);

    if(occupied){
        seat.innerHTML=`<img src="${photo}">`;
    }else{
        seat.innerHTML=`<div class="seat-num">${parseInt(seatNum)+1}</div>`;
    }
}

function toggleMic(){
    if(mySeat===null)return;
    isMicOn=!isMicOn;

    if(localStream){
        localStream.getAudioTracks()[0].enabled=isMicOn;
    }

    document.getElementById('micBtn').classList.toggle('muted',!isMicOn);

    db.collection('rooms').doc(myRoomId).collection('seats').doc(mySeat.toString()).update({
        talking: isMicOn
    });
}

function sendMsg(){
    let msg=document.getElementById('chatInput').value.trim();
    if(!msg)return;

    db.collection('rooms').doc(myRoomId).collection('chat').add({
        name:myName,
        msg:msg,
        userId:myId,
        time:firebase.firestore.FieldValue.serverTimestamp()
    });

    document.getElementById('chatInput').value='';
}

function addChatMsg(name,msg,isOwn){
    let div=document.createElement('div');
    div.className='chat-msg';
    if(isOwn)div.classList.add('own');
    div.innerText=name+': '+msg;
    document.getElementById('chatMessages').appendChild(div);
    document.getElementById('chatMessages').scrollTop=99999;
}

function exitRoom(){
    if(mySeat!==null){
        db.collection('rooms').doc(myRoomId).collection('seats').doc(mySeat.toString()).delete();
    }
    if(myRoomId){
        db.collection('rooms').doc(myRoomId).update({
            users: firebase.firestore.FieldValue.increment(-1)
        });
    }

    if(seatsUnsubscribe) seatsUnsubscribe();
    if(chatUnsubscribe) chatUnsubscribe();
    if(localStream)localStream.getTracks().forEach(t=>t.stop());

    document.getElementById('roomScreen').classList.remove('active');
    document.getElementById('homeScreen').classList.add('active');
    inRoom=false;
    mySeat=null;
    isMicOn=false;
    connectedPeers={};
}
</script>
</body>
</html>
