<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>لوحة الادمن</title>
<style>body{background:#0a0a0a;color:white;font-family:Cairo;padding:20px} h1{color:#ff4444}.tabs button{padding:10px 20px;background:#222;border:none;color:white;cursor:pointer;margin:5px}.tabs button.active{background:#ff4444}.card{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:10px;border-left:4px solid orange}.btn{padding:8px 15px;background:#00ff88;color:#000;border:none;border-radius:8px;cursor:pointer;margin:3px;font-weight:bold}.btn.red{background:#ff4444;color:white}.btn.blue{background:#00aaff;color:white} img{max-width:200px;border-radius:10px;margin-top:10px} input{padding:6px;border-radius:5px;border:1px solid #333;background:#222;color:white;width:70px}</style>
</head><body>
<div id="app">جاري التحميل...</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {apiKey: "AIzaSyC7nexX-dwj_IhYC5EaS-DU_YQeE6-acDw",authDomain: "game-af286.firebaseapp.com",projectId: "game-af286",storageBucket: "game-af286.firebasestorage.app",messagingSenderId: "567693078252",appId: "1:567693078252:web:3b5d6475a583f1f7347fc9"};
const app=initializeApp(firebaseConfig); const db=getFirestore(app); const auth=getAuth(app);
await setPersistence(auth, browserLocalPersistence);
const ADMIN_EMAIL = "alaaahmedsayd16@gmail.com";

onAuthStateChanged(auth, async user => {
  const appDiv = document.getElementById('app');
  if(!user) {appDiv.innerHTML = '<h1>سجل دخول اول</h1><button class="btn" onclick="location.href=\'/\')">الرجوع للرئيسية</button>'; return;}

  const userDoc = await getDoc(doc(db,"users",user.uid));
  const isAdmin = user.email === ADMIN_EMAIL || userDoc.data()?.role === 'admin';
  if(!isAdmin) {appDiv.innerHTML = `<h1>انت مش الادمن</h1><p>UID: ${user.uid}</p>`; return;}

  appDiv.innerHTML = `<h1>📊 لوحة تحكم الادمن</h1><div class="tabs"><button class="active" onclick="showTab('orders')">الطلبات</button><button onclick="showTab('dist')">طلبات الموزعين</button><button onclick="showTab('users')">الموزعين</button></div><div id="orders"></div><div id="dist" style="display:none"></div><div id="users" style="display:none"></div>`;

  onSnapshot(query(collection(db,"orders"),orderBy("createdAt","desc")),(snap)=>{
    let html='';
    snap.forEach(d=>{const o=d.data();
    html+=`<div class="card"><b>${o.game}</b> ${o.userRole==='distributor'?'<span style="background:#00ff88;color:#000;padding:3px 8px;border-radius:5px">موزع</span>':''}<br>ID: ${o.playerId}<br>${o.package.name} - ${o.package.price}ج<br>العميل: ${o.email}<br>رقم الكاش: ${o.walletNumber}<br>الحالة:${o.status}<br><img src="${o.proof}"><br><button class="btn" onclick="upd('${d.id}','done')">✅ تم الشحن</button><button class="btn red" onclick="upd('${d.id}','cancelled')">❌ رفض</button></div>`});
    document.getElementById('orders').innerHTML=html;
  });

  onSnapshot(collection(db,"distributor_requests"),(snap)=>{
    let html='';
    snap.forEach(d=>{const o=d.data();
    html+=`<div class="card"><b>${o.name}</b> - ${o.email}<br>واتساب: ${o.phone}<br>الخبرة: ${o.exp}<br>الحالة:${o.status}<br>
    نسبة الخصم: <input type="number" id="disc_${d.id}" value="15" min="0" max="50"> %
    <br><button class="btn" onclick="approveDist('${d.id}','${o.uid}')">✅ قبول</button><button class="btn red" onclick="updDist('${d.id}','rejected')">❌ رفض</button></div>`});
    document.getElementById('dist').innerHTML=html;
  });

  onSnapshot(query(collection(db,"users"),where("role","==","distributor")),(snap)=>{
    let html='';
    snap.forEach(d=>{const o=d.data();
    html+=`<div class="card"><b>${o.name}</b> - ${o.email}<br>
    نسبة الخصم الحالية: ${o.discount || 0}%
    <input type="number" id="edit_disc_${d.id}" value="${o.discount || 15}" min="0" max="50"> %
    <button class="btn blue" onclick="updateDiscount('${d.id}')">💾 حفظ الخصم</button></div>`});
    document.getElementById('users').innerHTML=html;
  });
});

window.upd=async(id,s)=>{await updateDoc(doc(db,"orders",id),{status:s})}
window.updDist=async(id,s)=>{await updateDoc(doc(db,"distributor_requests",id),{status:s})}
window.approveDist=async(id,uid)=>{const discount = document.getElementById(`disc_${id}`).value;await updateDoc(doc(db,"distributor_requests",id),{status:'approved'});await updateDoc(doc(db,"users",uid),{role:'distributor', discount: Number(discount)});alert('تم قبول الموزع بخصم ' + discount + '%');}
window.updateDiscount=async(uid)=>{const discount = document.getElementById(`edit_disc_${uid}`).value;await updateDoc(doc(db,"users",uid),{discount: Number(discount)});alert('تم تحديث الخصم لـ ' + discount + '%');}
window.showTab=(t)=>{document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');document.getElementById('orders').style.display=t=='orders'?'block':'none';document.getElementById('dist').style.display=t=='dist'?'block':'none';document.getElementById('users').style.display=t=='users'?'block':'none';}
</script></body></html>
