<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>لوحة الادمن</title>
<style>
body{background:#0a0a0a;color:white;font-family:Cairo;padding:20px}
h1{color:#ff4444}
.tabs button{padding:10px 20px;background:#222;border:none;color:white;cursor:pointer;margin:5px;border-radius:8px}
.tabs button.active{background:#ff4444}
.card{background:#1a1a1a;padding:15px;margin:10px 0;border-radius:10px;border-left:4px solid orange;position:relative}
.btn{padding:8px 15px;background:#00ff88;color:#000;border:none;border-radius:8px;cursor:pointer;margin:3px;font-weight:bold}
.btn.red{background:#ff4444;color:white}
.btn.blue{background:#00aaff;color:white}
.btn.gray{background:#555;color:white}
img{max-width:200px;border-radius:10px;margin-top:10px}
input,textarea{padding:10px;border-radius:5px;border:1px solid #333;background:#222;color:white;width:100%;margin:5px 0}
input[type="number"]{width:70px}
.setting-box{background:#141414;padding:20px;border-radius:10px;margin:20px 0;border:1px solid #333}
.del-btn{position:absolute;top:10px;left:10px;background:#ff0000;color:white;border:none;padding:5px 10px;border-radius:5px;cursor:pointer;font-size:12px}

/* مودال المسح الاحترافي */
.modal-del{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);justify-content:center;align-items:center;z-index:9999}
.modal-del-content{background:#141414;padding:30px;border-radius:15px;width:90%;max-width:400px;border:2px solid #ff4444;text-align:center}
.modal-del-content h2{color:#ff4444;margin-bottom:15px}
.modal-del-content p{color:#ccc;margin-bottom:20px}
.modal-btns{display:flex;gap:10px;justify-content:center}

/* Toast احترافي */
#toast{position:fixed;bottom:20px;right:20px;background:#00ff88;color:#000;padding:15px 25px;border-radius:10px;font-weight:bold;display:none;z-index:10000;animation:slideIn 0.3s}
#toast.error{background:#ff4444;color:white}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.login-box{background:#141414;padding:30px;border-radius:15px;max-width:400px;margin:100px auto;border:1px solid #333;text-align:center}
</style>
</head><body>
<div id="app">جاري التحميل...</div>
<div id="toast"></div>

<!-- مودال تأكيد المسح -->
<div class="modal-del" id="deleteModal">
  <div class="modal-del-content">
    <h2>⚠️ تأكيد الحذف</h2>
    <p id="deleteText">هل انت متأكد انك عايز تمسح ده؟</p>
    <div class="modal-btns">
      <button class="btn red" id="confirmDeleteBtn">🗑️ نعم امسح</button>
      <button class="btn gray" onclick="closeDeleteModal()">الغاء</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, onSnapshot, doc, updateDoc, query, orderBy, where, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {apiKey: "AIzaSyC7nexX-dwj_IhYC5EaS-DU_YQeE6-acDw",authDomain: "game-af286.firebaseapp.com",projectId: "game-af286",storageBucket: "game-af286.firebasestorage.app",messagingSenderId: "567693078252",appId: "1:567693078252:web:3b5d6475a583f1f7347fc9"};
const app=initializeApp(firebaseConfig); const db=getFirestore(app); const auth=getAuth(app);
await setPersistence(auth, browserLocalPersistence);
const ADMIN_EMAIL = "alaaahmedsayd16@gmail.com";

let deleteAction = null;

function showToast(msg, type='success'){
  const t=document.getElementById('toast');
  t.innerText=msg;
  t.className = type=='error' ? 'error' : '';
  t.style.display='block';
  setTimeout(()=>t.style.display='none',3000)
}

onAuthStateChanged(auth, async user => {
  const appDiv = document.getElementById('app');
  if(!user) {
    appDiv.innerHTML = `
    <div class="login-box">
      <h1>🔐 تسجيل دخول الادمن</h1>
      <input type="email" id="adminEmail" placeholder="ايميل الادمن" value="${ADMIN_EMAIL}">
      <input type="password" id="adminPass" placeholder="كلمة السر">
      <button class="btn" onclick="adminLogin()">دخول</button>
      <button class="btn gray" onclick="location.href='/'">الرجوع للرئيسية</button>
    </div>`;
    return;
  }

  const userDoc = await getDoc(doc(db,"users",user.uid));
  const isAdmin = user.email === ADMIN_EMAIL || userDoc.data()?.role === 'admin';
  
  if(!isAdmin) {
    appDiv.innerHTML = `
    <div class="login-box">
      <h1>⛔ انت مش الادمن</h1>
      <p>الايميل الحالي: ${user.email}</p>
      <p>UID: ${user.uid}</p>
      <button class="btn red" onclick="logout()">تسجيل خروج</button>
    </div>`;
    return;
  }

  loadAdminPanel();
});

function loadAdminPanel(){
  const appDiv = document.getElementById('app');
  appDiv.innerHTML = `
  <h1>📊 لوحة تحكم الادمن</h1>
  <button class="btn red" onclick="logout()" style="float:left">تسجيل خروج</button>
  <div class="tabs">
    <button class="active" onclick="showTab('orders')">الطلبات</button>
    <button onclick="showTab('dist')">طلبات الموزعين</button>
    <button onclick="showTab('users')">الموزعين</button>
    <button onclick="showTab('settings')">⚙️ الاعدادات</button>
  </div>
  <div id="orders"></div><div id="dist" style="display:none"></div><div id="users" style="display:none"></div><div id="settings" style="display:none"></div>
  `;

  // الطلبات
  onSnapshot(query(collection(db,"orders"),orderBy("createdAt","desc")),(snap)=>{
    let html='';
    snap.forEach(d=>{const o=d.data();
    html+=`<div class="card">
    <button class="del-btn" onclick="openDeleteModal('order','${d.id}','الطلب بتاع ${o.email} للعبة ${o.game}')">🗑️ مسح</button>
    <b>${o.game}</b> ${o.userRole==='distributor'?'<span style="background:#00ff88;color:#000;padding:3px 8px;border-radius:5px">موزع</span>':o.userRole==='guest'?'<span style="background:#ffb800;color:#000;padding:3px 8px;border-radius:5px">زائر</span>':''}<br>
    ID: ${o.playerId}<br>${o.package.name} - ${o.package.price}ج<br>
    العميل: ${o.email}<br>رقم الكاش: ${o.walletNumber}<br>الحالة:${o.status}<br>
    <img src="${o.proof}"><br>
    <button class="btn" onclick="upd('${d.id}','done')">✅ تم الشحن</button>
    <button class="btn red" onclick="upd('${d.id}','cancelled')">❌ رفض</button>
    </div>`});
    document.getElementById('orders').innerHTML=html;
  });

  // طلبات الموزعين
  onSnapshot(collection(db,"distributor_requests"),(snap)=>{
    let html='';
    snap.forEach(d=>{const o=d.data();
    html+=`<div class="card">
    <button class="del-btn" onclick="openDeleteModal('dist','${d.id}','طلب موزع: ${o.name}')">🗑️ مسح</button>
    <b>${o.name}</b> - ${o.email}<br>واتساب: ${o.phone}<br>الخبرة: ${o.exp}<br>الحالة:${o.status}<br>
    نسبة الخصم: <input type="number" id="disc_${d.id}" value="15" min="0" max="50"> %
    <br><button class="btn" onclick="approveDist('${d.id}','${o.uid}')">✅ قبول</button>
    <button class="btn red" onclick="updDist('${d.id}','rejected')">❌ رفض</button>
    </div>`});
    document.getElementById('dist').innerHTML=html;
  });

  // الموزعين
  onSnapshot(query(collection(db,"users"),where("role","==","distributor")),(snap)=>{
    let html='';
    snap.forEach(d=>{const o=d.data();
    html+=`<div class="card">
    <button class="del-btn" onclick="openDeleteModal('user','${d.id}','الموزع: ${o.name}')">🗑️ مسح</button>
    <b>${o.name}</b> - ${o.email}<br>
    نسبة الخصم الحالية: ${o.discount || 0}%
    <input type="number" id="edit_disc_${d.id}" value="${o.discount || 15}" min="0" max="50"> %
    <button class="btn blue" onclick="updateDiscount('${d.id}')">💾 حفظ الخصم</button>
    </div>`});
    document.getElementById('users').innerHTML=html;
  });

  getDoc(doc(db,"settings","marquee")).then(snap=>{
    if(snap.exists() && document.getElementById('marqueeInput')) document.getElementById('marqueeInput').value = snap.data().text;
  });
  getDoc(doc(db,"settings","global_notification")).then(snap=>{
    if(snap.exists() && document.getElementById('globalNotifInput')) document.getElementById('globalNotifInput').value = snap.data().text;
  });

  document.getElementById('settings').innerHTML = `
  <div class="setting-box">
    <h2>🎁 التحكم في الشريط المتحرك</h2>
    <input type="text" id="marqueeInput" placeholder="اكتب العرض هنا">
    <button class="btn" onclick="saveMarquee()">حفظ الشريط</button>
  </div>
  <div class="setting-box">
    <h2>📢 اشعار للكل</h2>
    <p>ده هيظهر لكل الناس فوق في صندوق</p>
    <textarea id="globalNotifInput" rows="3" placeholder="اكتب الاشعار هنا"></textarea>
    <button class="btn" onclick="saveGlobalNotif()">نشر الاشعار</button>
  </div>
  `;
}

// فنكشنز التحديث
window.upd=async(id,s)=>{
  await updateDoc(doc(db,"orders",id),{status:s});
  showToast(s=='done' ? '✅ تم الشحن بنجاح' : '❌ تم رفض الطلب', s=='done' ? 'success' : 'error');
}
window.updDist=async(id,s)=>{
  await updateDoc(doc(db,"distributor_requests",id),{status:s});
  showToast('❌ تم رفض طلب الموزع','error');
}
window.approveDist=async(id,uid)=>{
  const discount = document.getElementById(`disc_${id}`).value;
  await updateDoc(doc(db,"distributor_requests",id),{status:'approved'});
  await updateDoc(doc(db,"users",uid),{role:'distributor', discount: Number(discount)});
  showToast('✅ تم قبول الموزع بخصم ' + discount + '%');
}
window.updateDiscount=async(uid)=>{
  const discount = document.getElementById(`edit_disc_${uid}`).value;
  await updateDoc(doc(db,"users",uid),{discount: Number(discount)});
  showToast('✅ تم تحديث الخصم لـ ' + discount + '%');
}

// نظام المودال
window.openDeleteModal = (type,id,text)=>{
  document.getElementById('deleteText').innerText = `هل انت متأكد انك عايز تمسح: ${text} ؟`;
  document.getElementById('deleteModal').style.display = 'flex';
  
  if(type=='order') deleteAction = ()=>deleteOrder(id);
  if(type=='dist') deleteAction = ()=>deleteDistRequest(id);
  if(type=='user') deleteAction = ()=>deleteDistributor(id);
  
  document.getElementById('confirmDeleteBtn').onclick = async ()=>{
    await deleteAction();
    closeDeleteModal();
  }
}
window.closeDeleteModal = ()=>{document.getElementById('deleteModal').style.display = 'none'; deleteAction = null;}

// فنكشنز المسح
window.deleteOrder=async(id)=>{await deleteDoc(doc(db,"orders",id));showToast('✅ تم مسح الطلب');}
window.deleteDistRequest=async(id)=>{await deleteDoc(doc(db,"distributor_requests",id));showToast('✅ تم مسح طلب الموزع');}
window.deleteDistributor=async(id)=>{await updateDoc(doc(db,"users",id),{role:'user', discount: 0});showToast('✅ تم ازالة رتبة الموزع');}

window.saveMarquee = async ()=>{
  const text = document.getElementById('marqueeInput').value;
  await setDoc(doc(db,"settings","marquee"), {text});
  showToast('✅ تم حفظ الشريط المتحرك');
}
window.saveGlobalNotif = async ()=>{
  const text = document.getElementById('globalNotifInput').value;
  await setDoc(doc(db,"settings","global_notification"), {text});
  showToast('✅ تم نشر الاشعار للكل');
}

window.showTab=(t)=>{
  document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  ['orders','dist','users','settings'].forEach(id=>document.getElementById(id).style.display=id==t?'block':'none');
}

window.adminLogin = async ()=>{
  const email = document.getElementById('adminEmail').value;
  const pass = document.getElementById('adminPass').value;
  try{
    await signInWithEmailAndPassword(auth,email,pass);
    showToast('تم تسجيل الدخول');
  }catch(e){
    showToast('⚠️ الايميل او كلمة السر غلط','#ff4444');
  }
}

window.logout = ()=>signOut(auth);
</script></body></html>
