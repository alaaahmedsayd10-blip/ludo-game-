<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طريق الدجاج</title>
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        min-height: 100vh;
        background: #0f172a;
        color: white;
        font-family: 'Segoe UI', 'Arial', sans-serif;
        overflow-x: hidden;
    }

    #road {
        background: rgba(60,60,60,0.85);
        height: 320px;
        position: relative;
        overflow-x: auto;
        overflow-y: hidden;
        border-bottom: 4px solid #777;
        margin-top: 70px;
    }

    #player {
        position: absolute; left: 50px; bottom: 60px;
        font-size: 50px; transition: all 0.5s; z-index: 10;
        filter: drop-shadow(0 0 10px rgba(0,0,0,0.8));
    }

    #fireEffect {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 0;
        background: linear-gradient(to top, #ff4500, #ff8c00, transparent);
        opacity: 0;
        transition: all 0.8s ease-out;
        z-index: 5;
        pointer-events: none;
    }
    #fireEffect.show {
        height: 120px;
        opacity: 1;
        animation: flicker 0.3s infinite alternate;
    }
    @keyframes flicker {
        0% { opacity: 0.8; }
        100% { opacity: 1; }
    }

    #authScreen, #gameScreen, #profilePanel, #adminPanel, #walletPanel {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        display: none; align-items: center; justify-content: center;
        flex-direction: column;
        background: rgba(0,0,0,0.95);
        z-index: 100;
    }
    #gameScreen { background: transparent; display: none; }

   .box {
        background: rgba(30,41,59,0.95);
        border-radius: 20px;
        width: 90%; max-width: 500px;
        padding: 20px;
        border: 1px solid rgba(255,255,255,0.1);
    }

    input, select, button {
        width: 100%; padding: 14px; margin: 10px 0;
        border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        font-size: 15px; background: #1e293b; color: white; outline: none;
    }
    button {
        background: linear-gradient(135deg, #00ff88 0%, #00d4aa 100%);
        color: #000; font-weight: 600; cursor: pointer; border: none;
    }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
   .btn-red { background: #ff4757; color: white; }

    #topBar {
        position: fixed; top: 0; left: 0; width: 100%;
        padding: 12px 15px; background: rgba(0,0,0,0.8);
        display: flex; justify-content: flex-end; align-items: center;
        gap: 10px; z-index: 50;
    }
    #userInfo {
        background: rgba(102,126,234,0.2);
        padding: 8px 16px; border-radius: 25px;
        font-size: 14px; font-weight: 600; cursor: pointer;
    }
   .iconBtn {
        width: 44px; height: 44px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 20px;
    }
    #adminBtn { background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%); display: none; }

   .multiplier {
        position: absolute; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        border-radius: 50%; width: 70px; height: 70px;
        display: flex; align-items: center; justify-content: center;
        font-weight: bold; border: 3px solid #fff; font-size: 14px;
    }
   .multiplier.active {
        background: linear-gradient(135deg, #00ff88 0%, #00d4aa 100%);
        box-shadow: 0 0 30px #00ff88;
    }
   .multiplier.gate {
        background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
        font-size: 35px;
    }

    #panel {
        background: rgba(0,0,0,0.95); padding: 20px;
        position: fixed; bottom: 0; width: 100%;
        border-top: 3px solid #667eea;
    }
    #balance { font-size: 22px; margin-bottom: 15px; color: #ffd700; font-weight: bold; }
    #cashBtn { background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%); color: #000; width: 60%; }
    #goBtn { background: linear-gradient(135deg, #00ff88 0%, #00d4aa 100%); color: #000; width: 35%; }
    #status { margin-top: 10px; text-align: center; font-weight: bold; }

   .menuItem {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 20px; cursor: pointer; border-bottom: 1px solid #1e293b;
    }
   .menuItem:hover { background: #1e293b; }
   .walletAmount { font-size: 28px; font-weight: bold; color: #fbbf24; margin: 10px 0; text-align: center; }
   .closeBtn {
        position: absolute; top: 15px; left: 15px;
        width: 42px; height: 42px; border-radius: 50%;
        background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2);
        font-size: 20px; cursor: pointer; color: white;
    }
</style>
</head>
<body>

<!-- الأصوات -->
<audio id="soundStart" src="https://assets.mixkit.co/sfx/preview/mixkit-arcade-game-jump-coin-216.mp3" preload="auto"></audio>
<audio id="soundWin" src="https://assets.mixkit.co/sfx/preview/mixkit-winning-chimes-2015.mp3" preload="auto"></audio>
<audio id="soundLose" src="https://assets.mixkit.co/sfx/preview/mixkit-retro-arcade-lose-2026.mp3" preload="auto"></audio>

<div id="authScreen">
  <div class="box">
    <h2 style="text-align:center;">تسجيل دخول</h2>
    <input id="loginEmail" type="email" placeholder="الإيميل">
    <input id="loginPass" type="password" placeholder="كلمة السر">
    <button id="loginBtn">دخول</button>
  </div>
</div>

<div id="gameScreen">
  <div id="topBar">
    <div id="userInfo" onclick="openProfile()"></div>
    <div id="adminBtn" class="iconBtn" onclick="openAdmin()">👑</div>
  </div>

  <div id="road">
    <div id="fireEffect"></div>
    <div id="player">🐔</div>
    <div class="multiplier" style="left:100px; bottom:90px;" data-mult="1.5">1.5x</div>
    <div class="multiplier" style="left:180px; bottom:90px;" data-mult="2.0">2.0x</div>
    <div class="multiplier" style="left:260px; bottom:90px;" data-mult="2.8">2.8x</div>
    <div class="multiplier" style="left:340px; bottom:90px;" data-mult="3.5">3.5x</div>
    <div class="multiplier" style="left:420px; bottom:90px;" data-mult="4.5">4.5x</div>
    <div class="multiplier" style="left:500px; bottom:90px;" data-mult="5.8">5.8x</div>
    <div class="multiplier" style="left:580px; bottom:90px;" data-mult="7.2">7.2x</div>
    <div class="multiplier" style="left:660px; bottom:90px;" data-mult="9.0">9.0x</div>
    <div class="multiplier" style="left:740px; bottom:90px;" data-mult="11.5">11.5x</div>
    <div class="multiplier" style="left:820px; bottom:90px;" data-mult="14.0">14.0x</div>
    <div class="multiplier" style="left:900px; bottom:90px;" data-mult="18.0">18.0x</div>
    <div class="multiplier" style="left:980px; bottom:90px;" data-mult="23.0">23.0x</div>
    <div class="multiplier" style="left:1060px; bottom:90px;" data-mult="30.0">30.0x</div>
    <div class="multiplier" style="left:1140px; bottom:90px;" data-mult="40.0">40.0x</div>
    <div class="multiplier" style="left:1220px; bottom:90px;" data-mult="60.0">60.0x</div>
    <div class="multiplier gate" style="left:1300px; bottom:90px;">🏆</div>
  </div>

  <div id="panel">
    <div id="balance">الكوينز: 0</div>
    <div>
      <select id="bet">
        <option value="10">10 كوينز</option>
        <option value="50">50 كوينز</option>
        <option value="100">100 كوينز</option>
        <option value="200">200 كوينز</option>
        <option value="500">500 كوينز</option>
      </select>
      <select id="difficulty">
        <option value="15">متوسط</option>
        <option value="30">صعب - المضاعفات x2</option>
      </select>
    </div>
    <div style="margin-top:15px;">
      <button id="cashBtn" disabled>سحب<br><span id="cashAmount">0</span></button>
      <button id="goBtn">يلا نلعب</button>
    </div>
    <div id="status"></div>
  </div>
</div>

<div id="profilePanel">
  <div class="box">
    <button class="closeBtn" onclick="closePanel('profilePanel')">×</button>
    <h2 style="text-align:center;">البروفايل</h2>
    <div class="menuItem" onclick="openWallet()">
      <span>💳 المحفظة</span>
      <span>></span>
    </div>
    <button class="btn-red" onclick="logout()">تسجيل الخروج</button>
  </div>
</div>

<div id="walletPanel">
  <div class="box">
    <button class="closeBtn" onclick="closePanel('walletPanel')">×</button>
    <h2 style="text-align:center;">المحفظة</h2>
    <div>رصيدك الحالي</div>
    <div class="walletAmount" id="walletCoins">0 كوينز</div>
  </div>
</div>

<div id="adminPanel">
  <div class="box">
    <button class="closeBtn" onclick="closePanel('adminPanel')">×</button>
    <h2 style="text-align:center;">لوحة الأدمن</h2>
    <h3>💸 إرسال كوينز</h3>
    <input id="adminSendID" type="text" placeholder="ID اللاعب" style="text-transform:uppercase;">
    <input id="adminSendAmount" type="number" placeholder="المبلغ" min="1">
    <button onclick="adminSendCoins()">إرسال</button>
    <div id="adminSendStatus" style="margin-top:10px;"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, increment, query, where, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7nexX-dwj_IhYC5EaS-DU_YQeE6-acDw",
  authDomain: "game-af286.firebaseapp.com",
  projectId: "game-af286",
  storageBucket: "game-af286.firebasestorage.app",
  messagingSenderId: "567693078252",
  appId: "1:567693078252:web:3b5d6475a583f1f7347fc9",
  measurementId: "G-JKFYDGCFML"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const ADMIN_UID = "sPQ9h5s5pQYONHz0eTuhet8jKq82";

let currentUser = null;
let userData = { coins: 0, skin: '🐔', shortID: '' };
let bet = 0, multiplier = 1, running = false, currentStep = 0;
let gameSteps = [];

const positions = [100, 180, 260, 340, 420, 500, 580, 660, 740, 820, 900, 980, 1060, 1140, 1220];
const baseMultipliers = [1.5, 2.0, 2.8, 3.5, 4.5, 5.8, 7.2, 9.0, 11.5, 14.0, 18.0, 23.0, 30.0, 40.0, 60.0];

const soundStart = document.getElementById('soundStart');
const soundWin = document.getElementById('soundWin');
const soundLose = document.getElementById('soundLose');
const fireEffect = document.getElementById('fireEffect');

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('gameScreen').style.display = 'block';
    await loadUserData();
    if (user.uid === ADMIN_UID) {
      document.getElementById('adminBtn').style.display = 'flex';
    }
  } else {
    currentUser = null;
    document.getElementById('authScreen').style.display = 'flex';
    document.getElementById('gameScreen').style.display = 'none';
  }
});

async function loadUserData() {
  const userDoc = await getDoc(doc(db, "users", currentUser.uid));
  if (userDoc.exists()) {
    userData = userDoc.data();
    document.getElementById('balance').innerText = `الكوينز: ${userData.coins}`;
    document.getElementById('player').innerText = userData.skin || '🐔';
    document.getElementById('userInfo').innerText = `${currentUser.email.split('@')[0]} | ${userData.coins}`;
  }
}

window.openProfile = () => document.getElementById('profilePanel').style.display = 'flex';
window.openWallet = () => {
  document.getElementById('walletPanel').style.display = 'flex';
  document.getElementById('walletCoins').innerText = userData.coins + ' كوينز';
}
window.openAdmin = () => document.getElementById('adminPanel').style.display = 'flex';
window.closePanel = (id) => document.getElementById(id).style.display = 'none';

window.logout = async () => {
  await signOut(auth);
  closePanel('profilePanel');
}

document.getElementById('loginBtn').onclick = async () => {
  const email = document.getElementById('loginEmail').value;
  const pass = document.getElementById('loginPass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    alert("خطأ: " + e.message);
  }
}

window.startGame = function() {
  if (running) {
    moveChicken();
    return;
  }

  fireEffect.classList.remove('show');
  soundStart.currentTime = 0;
  soundStart.play();

  const difficulty = parseInt(document.getElementById('difficulty').value);
  const boost = difficulty === 30? 2 : 1;

  gameSteps = [];
  for(let i=0; i<positions.length; i++){
    gameSteps.push({
      left: positions[i],
      mult: baseMultipliers[i] * boost
    });
  }

  bet = parseInt(document.getElementById('bet').value);
  if (bet > userData.coins) {
    document.getElementById('status').innerText = "معكش كوينز كفاية!";
    return;
  }

  userData.coins -= bet;
  updateDoc(doc(db, "users", currentUser.uid), { coins: userData.coins });
  document.getElementById('balance').innerText = `الكوينز: ${userData.coins}`;

  running = true;
  currentStep = 0;
  multiplier = 1;

  document.getElementById('cashBtn').disabled = false;
  document.getElementById('goBtn').disabled = true;
  document.getElementById('status').innerText = difficulty === 30? "صعب! المضاعفات x2 🔥" : "اضغط للحركة التالية!";
  document.getElementById('cashAmount').innerText = Math.floor(bet * multiplier);
  document.getElementById('player').style.left = "50px";

  document.querySelectorAll('.multiplier').forEach(el => {
    const baseMult = parseFloat(el.dataset.mult);
    if (baseMult) el.innerText = (baseMult * boost).toFixed(1) + 'x';
  });
}

function moveChicken() {
  if (!running) return;

  const difficulty = parseInt(document.getElementById('difficulty').value);
  const failChance = difficulty / 100;

  if (currentStep >= gameSteps.length) {
    cashOut();
    return;
  }

  if (Math.random() < failChance) {
    running = false;

    if (currentStep >= 3) {
      fireEffect.classList.add('show');
      soundLose.currentTime = 0;
      soundLose.play();
    }

    setTimeout(() => {
      document.getElementById('status').innerText = "خسرت! 🔥";
      document.getElementById('goBtn').disabled = false;
      document.getElementById('cashBtn').disabled = true;
      document.getElementById('player').style.left = "50px";
      document.querySelectorAll('.multiplier').forEach(m => m.classList.remove('active'));
    }, currentStep >= 3? 800 : 0);

    setTimeout(() => fireEffect.classList.remove('show'), 2800);
    return;
  }

  const step = gameSteps[currentStep];
  multiplier = step.mult;
  document.getElementById('player').style.left = step.left + "px";
  document.getElementById('cashAmount').innerText = Math.floor(bet * multiplier);

  document.querySelectorAll('.multiplier').forEach(m => m.classList.remove('active'));
  document.querySelectorAll('.multiplier')[currentStep].classList.add('active');

  currentStep++;
}

function cashOut() {
  if (!running) return;
  running = false;

  soundWin.currentTime = 0;
  soundWin.play();

  const winAmount = Math.floor(bet * multiplier);
  userData.coins += winAmount;

  updateDoc(doc(db, "users", currentUser.uid), { coins: increment(winAmount) });

  document.getElementById('balance').innerText = `الكوينز: ${userData.coins}`;
  document.getElementById('userInfo').innerText = `${currentUser.email.split('@')[0]} | ${userData.coins}`;
  document.getElementById('status').innerText = `كسبت ${winAmount} كوينز! 🎉`;

  document.getElementById('goBtn').disabled = false;
  document.getElementById('cashBtn').disabled = true;
  document.querySelectorAll('.multiplier').forEach(m => m.classList.remove('active'));
}

window.adminSendCoins = async function() {
  const shortID = document.getElementById('adminSendID').value.trim().toUpperCase();
  const amount = parseInt(document.getElementById('adminSendAmount').value);
  const status = document.getElementById('adminSendStatus');

  if (!shortID ||!amount || amount < 1) {
    status.innerText = "❌ دخل ID ومبلغ صح";
    return;
  }

  try {
    const q = query(collection(db, "users"), where("shortID", "==", shortID));
    const snap = await getDocs(q);
    if (snap.empty) throw new Error("الـ ID مش موجود");

    await updateDoc(doc(db, "users", snap.docs[0].id), {
      coins: increment(amount)
    });

    status.innerText = "✅ تم الإرسال بنجاح";
    document.getElementById('adminSendID').value = '';
    document.getElementById('adminSendAmount').value = '';
  } catch (e) {
    status.innerText = "❌ " + e.message;
  }
}

document.getElementById('goBtn').onclick = startGame;
document.getElementById('cashBtn').onclick = cashOut;
</script>
</body>
</html>
