  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Room</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
:root{
    --bg:#0f0f14; --card:#1a1a22; --primary:#7c3aed; --primary-light:#a78bfa;
    --accent:#fbbf24; --danger:#ef4444; --success:#22c55e; --text:#ffffff; --text-dim:#9ca3af;
    --music-bg:#1e1e24; --music-header:#2a2a32;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

.loading-screen{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
.loading-spinner{width:50px;height:50px;border:3px solid #2a2a35;border-top:3px solid var(--primary);
    border-radius:50%;animation:spin 1s infinite;margin-bottom:15px}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

.home-screen,.profile-screen,.room-screen{display:none;flex-direction:column;height:100vh}
.home-screen.active,.profile-screen.active,.room-screen.active{display:flex}

.top-header{background:linear-gradient(135deg,var(--primary),var(--primary-light));
    padding:15px 20px;padding-top:45px}
.header-top{display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:800}

.rooms-list{flex:1;overflow-y:auto;padding:20px;padding-bottom:90px;position:relative}
.pull-refresh{position:absolute;top:-60px;left:0;right:0;text-align:center;color:var(--text-dim);
    font-size:14px;transition:0.3s}
.pull-refresh.active{top:10px}
.room-item{background:var(--card);border-radius:16px;padding:14px;margin-bottom:12px;
    display:flex;gap:14px;align-items:center;cursor:pointer;border:1px solid #2a2a35}
.room-avatar{width:65px;height:65px;border-radius:14px;object-fit:cover;border:2px solid var(--primary)}
.room-info{flex:1}
.room-name{font-weight:800;font-size:16px;margin-bottom:4px}
.room-desc{font-size:13px;color:var(--text-dim)}
.no-rooms{text-align:center;color:var(--text-dim);margin-top:80px;font-size:15px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);
    display:flex;justify-content:space-around;padding:10px 0;border-top:1px solid #2a2a35;
    transition:0.3s;z-index:50}
.bottom-nav.hidden{transform:translateY(100%)}
.nav-item{text-align:center;font-size:12px;color:var(--text-dim);cursor:pointer}
.nav-item.active{color:var(--primary)}
.nav-icon{font-size:26px;margin-bottom:4px}

.profile-header{padding:30px 20px;text-align:center;
    background:linear-gradient(135deg,var(--primary),var(--primary-light))}
.profile-avatar{width:110px;height:110px;border-radius:50%;border:4px solid var(--accent);
    margin-bottom:12px;object-fit:cover}
.change-photo-btn{background:rgba(255,255,255,0.2);padding:10px 24px;border-radius:25px;
    border:none;color:#fff;margin-top:12px;cursor:pointer;font-weight:700}
.my-room{margin:20px;padding:18px;background:var(--card);border-radius:16px;cursor:pointer;
    border:1px solid #2a2a35}

.room-screen{background:linear-gradient(180deg,#1a0f2e,#0f0f14,#1a0f2e)}
.room-header{padding:15px 20px;display:flex;align-items:center;gap:12px;
    background:rgba(0,0,0,0.3);backdrop-filter:blur(10px)}
.back-btn{font-size:26px;cursor:pointer;padding:5px}
.owner-info{display:flex;align-items:center;gap:12px;flex:1}
.owner-avatar{width:48px;height:48px;border-radius:50%;border:2px solid var(--accent);object-fit:cover}
.owner-name{font-weight:800;font-size:17px}
.settings-btn{font-size:24px;cursor:pointer;padding:8px}

.seats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:15px;padding:20px}
.seat{aspect-ratio:1;background:rgba(255,255,255,0.05);border-radius:50%;display:flex;
    align-items:center;justify-content:center;position:relative;cursor:pointer;border:2px solid transparent;transition:0.3s}
.seat.occupied{border-color:var(--accent);background:rgba(251,191,36,0.15)}
.seat.talking{border-color:var(--success);box-shadow:0 0 25px var(--success), 0 0 50px var(--success);
    animation:pulse 1.2s infinite}
.seat.muted{opacity:0.4}
.seat.talking::after{content:'🎤';position:absolute;top:-8px;right:-8px;background:var(--success);
    border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;
    font-size:14px;animation:bounce 1s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 25px var(--success), 0 0 50px var(--success)}
    50%{box-shadow:0 0 35px var(--success), 0 0 70px var(--success)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.seat img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.seat-num{font-size:15px;font-weight:800;position:absolute}

.chat-box{margin:15px;background:rgba(0,0,0,0.4);border-radius:18px;height:190px;display:flex;
    flex-direction:column;border:1px solid #2a2a35}
.chat-messages{flex:1;overflow-y:auto;padding:12px;font-size:14px}
.chat-msg{margin-bottom:10px;padding:10px 14px;background:rgba(255,255,255,0.08);
    border-radius:12px;display:inline-block;max-width:85%}
.chat-msg.own{background:var(--primary);margin-left:auto;display:block}
.chat-input-area{display:flex;padding:12px;border-top:1px solid #2a2a35}
.chat-input{flex:1;background:rgba(255,255,255,0.08);border:none;border-radius:25px;
    padding:12px 18px;color:#fff;outline:none;font-size:14px}
.send-btn{margin-right:10px;padding:0 18px;background:var(--primary);border:none;
    border-radius:25px;color:#fff;font-weight:800;cursor:pointer}

.bottom-bar{background:rgba(0,0,0,0.5);padding:15px 20px;display:flex;justify-content:center;gap:20px}
.mic-btn{width:65px;height:65px;border-radius:50%;background:var(--success);
    display:flex;align-items:center;justify-content:center;font-size:30px;
    cursor:pointer;border:none;box-shadow:0 5px 20px rgba(34,197,94,0.4);transition:0.2s}
.mic-btn.muted{background:var(--danger);box-shadow:0 5px 20px rgba(239,68,68,0.4)}
.mic-btn:disabled{opacity:0.4;cursor:not-allowed}

.music-btn{position:fixed;bottom:85px;left:20px;width:55px;height:55px;border-radius:50%;
    background:var(--primary);display:flex;align-items:center;justify-content:center;
    font-size:26px;cursor:pointer;z-index:40}

.floating-room{position:fixed;bottom:90px;right:20px;background:var(--card);
    border-radius:50px;padding:10px 18px;display:none;align-items:center;gap:10px;
    box-shadow:0 8px 30px rgba(0,0,0,0.5);border:2px solid var(--primary);cursor:pointer;
    z-index:60}
.floating-room.active{display:flex}
.floating-room img{width:40px;height:40px;border-radius:50%;object-fit:cover}

.modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
.modal.active{display:flex}
.modal-content{background:var(--card);padding:28px;border-radius:24px;width:90%;max-width:380px;
    border:1px solid #2a2a35}
.modal-content input{width:100%;padding:15px;background:var(--bg);border:1px solid #2a2a35;
    border-radius:14px;color:#fff;margin-bottom:15px;font-size:16px}
.modal-buttons{display:flex;gap:12px;flex-direction:column}
.modal-buttons button{padding:15px;border:none;border-radius:14px;font-weight:800;
    cursor:pointer}
.btn-cancel{background:#2a2a35;color:#fff}
.btn-create{background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
.btn-save{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}

.now-playing{padding:12px;text-align:center;background:rgba(124,58,237,0.2);font-size:14px;
    color:var(--accent);font-weight:700}

/* Music Library Styles */
.music-library{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--music-bg);
    z-index:150;display:none;flex-direction:column}
.music-library.active{display:flex}
.music-header{background:var(--music-header);padding:15px 20px;padding-top:45px;
    display:flex;align-items:center;gap:15px}
.music-header h2{flex:1;text-align:center;font-size:18px;font-weight:700}
.back-music{font-size:28px;cursor:pointer}

.search-bar{padding:15px 20px;display:flex;gap:10px}
.search-input{flex:1;background:rgba(255,255,255,0.08);border:none;border-radius:25px;
    padding:12px 18px;color:#fff;outline:none;font-size:14px}
.search-btn{padding:0 20px;background:var(--primary);border:none;border-radius:25px;
    color:#fff;font-weight:700;cursor:pointer}

.music-tabs{display:flex;justify-content:space-around;padding:10px 20px;
    border-bottom:1px solid #2a2a35}
.tab{padding:10px 20px;cursor:pointer;font-weight:600;color:var(--text-dim)}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}

.play-all{display:flex;align-items:center;gap:10px;padding:15px 20px;cursor:pointer}
.play-all-btn{width:40px;height:40px;border-radius:50%;background:var(--accent);
    display:flex;align-items:center;justify-content:center;color:#000;font-size:18px}

.music-list{flex:1;overflow-y:auto;padding:10px 20px}
.music-item{display:flex;align-items:center;gap:15px;padding:12px 0;border-bottom:1px solid #2a2a35}
.music-icon{width:40px;height:40px;border-radius:50%;background:rgba(124,58,237,0.2);
    display:flex;align-items:center;justify-content:center;color:var(--accent)}
.music-info{flex:1}
.music-name{font-weight:600;font-size:15px;margin-bottom:4px}
.music-artist{font-size:13px;color:var(--text-dim)}
.fav-btn{font-size:24px;cursor:pointer;color:var(--text-dim)}
.fav-btn.active{color:var(--danger)}

.music-controls{padding:20px;background:var(--music-header)}
.volume-slider,.progress-slider{width:100%;margin:10px 0}
.add-music-btn{background:#00d4aa;color:#000;width:100%;padding:16px;border:none;
    border-radius:0;font-weight:800;font-size:16px;cursor:pointer}
</style>
</head>
<body>

<div class="loading-screen" id="loadingScreen">
    <div class="loading-spinner"></div>
    <div style="font-weight:700">جاري التحميل...</div>
</div>

<div class="home-screen" id="homeScreen">
    <div class="top-header">
        <div class="header-top">
            <div>الغرف الصوتية</div>
            <div onclick="createRoomModal()" style="font-size:28px;cursor:pointer">+</div>
        </div>
    </div>
    <div class="rooms-list" id="roomsList">
        <div class="pull-refresh" id="pullRefresh">↻ اسحب للتحديث</div>
        <div id="roomsContainer">
            <div class="no-rooms">مفيش غرف لسه. اعمل غرفة جديدة</div>
        </div>
    </div>
</div>

<div class="profile-screen" id="profileScreen">
    <div class="profile-header">
        <img class="profile-avatar" id="profileAvatar" src="https://i.pravatar.cc/150?u=user">
        <div id="profileName" style="font-size:22px;font-weight:800">أحمد</div>
        <button class="change-photo-btn" onclick="changePhoto()">تغيير الصورة</button>
    </div>
    <div id="myRoomBox"></div>
</div>

<div class="room-screen" id="roomScreen">
    <div class="room-header">
        <div class="back-btn" onclick="exitRoomConfirm()">←</div>
        <div class="owner-info">
            <img class="owner-avatar" id="ownerAvatar" src="">
            <div class="owner-name" id="ownerName"></div>
        </div>
        <div id="roomName" style="font-weight:700"></div>
        <div class="settings-btn" onclick="openSettings()">⚙️</div>
    </div>

    <div class="now-playing" id="nowPlaying" style="display:none">🎵 شغال دلوقتي: <span id="songName"></span></div>

    <div class="seats-grid" id="seatsGrid"></div>

    <div class="chat-box">
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <button class="send-btn" onclick="sendMsg()">إرسال</button>
            <input type="text" class="chat-input" id="chatInput" placeholder="اكتب رسالة للكل...">
        </div>
    </div>

    <div class="bottom-bar">
        <button class="mic-btn" id="micBtn" disabled onclick="openMicMenu()">🎤</button>
    </div>

    <div class="music-btn" onclick="openMusicLibrary()">🎵</div>
</div>

<!-- Music Library -->
<div class="music-library" id="musicLibrary">
    <div class="music-header">
        <div class="back-music" onclick="closeMusicLibrary()">☰</div>
        <h2>الموسيقى الخاصة بي</h2>
    </div>

    <div class="search-bar">
        <input type="text" class="search-input" id="searchInput" placeholder="إدخال اسم الموسيقى أو المغني">
        <button class="search-btn" onclick="searchMusic()">بحث</button>
    </div>

    <div class="music-tabs">
        <div class="tab" onclick="switchTab('fav')">المفضلة</div>
        <div class="tab active" onclick="switchTab('all')">الكل</div>
    </div>

    <div class="play-all" onclick="playAllMusic()">
        <div class="play-all-btn">▶</div>
        <span>تشغيل الكل</span>
    </div>

    <div class="music-list" id="musicList"></div>

    <div class="music-controls">
        <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80">
        <input type="range" class="progress-slider" id="progressSlider" min="0" max="100" value="0">
    </div>

    <button class="add-music-btn" onclick="document.getElementById('musicFileInput').click()">أضف موسيقى</button>
    <input type="file" id="musicFileInput" accept="audio/*" multiple style="display:none">
</div>

<div class="floating-room" id="floatingRoom" onclick="reenterRoom()">
    <img id="floatingImg" src="">
    <span id="floatingName"></span>
</div>

<div class="bottom-nav" id="bottomNav">
    <div class="nav-item" onclick="goToProfile()">
        <div class="nav-icon">👤</div>
        <div>أنا</div>
    </div>
    <div class="nav-item active" onclick="showScreen('homeScreen')">
        <div class="nav-icon">🏠</div>
        <div>الغرف</div>
    </div>
</div>

<div class="modal" id="createModal">
    <div class="modal-content">
        <h3>إنشاء غرفة جديدة</h3>
        <input type="text" id="roomNameInput" placeholder="اسم الغرفة">
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeModal()">إلغاء</button>
            <button class="btn-create" onclick="createRoom()">إنشاء</button>
        </div>
    </div>
</div>

<div class="modal" id="settingsModal">
    <div class="modal-content">
        <h3>إعدادات الغرفة</h3>
        <input type="text" id="editRoomName" placeholder="اسم الغرفة الجديد">
        <input type="file" id="editRoomImg" accept="image/*">
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeSettings()">إلغاء</button>
            <button class="btn-save" onclick="saveSettings()">حفظ</button>
        </div>
    </div>
</div>

<div class="modal" id="exitModal">
    <div class="modal-content">
        <h3>الخروج من الغرفة</h3>
        <p style="text-align:center;margin-bottom:20px;color:var(--text-dim)">عايز تخرج ازاي؟</p>
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeExitModal()">إلغاء</button>
            <button class="btn-save" onclick="exitRoom(true)">خروج وحفظ</button>
            <button class="btn-danger" onclick="exitRoom(false)">خروج نهائي</button>
        </div>
    </div>
</div>

<div class="modal" id="micMenuModal">
    <div class="modal-content">
        <h3 id="micMenuTitle">المايك</h3>
        <div class="modal-buttons" id="micMenuButtons"></div>
    </div>
</div>

<input type="file" id="photoInput" accept="image/*" style="display:none">
<audio id="bgAudio" loop playsinline style="visibility:hidden; position:absolute; width:0; height:0"></audio>
<audio id="micSound" src="https://cdn.pixabay.com/audio/2022/03/15/audio_3f1d1e0c3c.mp3" preload="auto"></audio>

<script>
let peer,myId,myName="أحمد",myPhoto="https://i.pravatar.cc/150?u=user";
let connections=[],localStream,musicStream;
let mySeat=null,seatStatus=new Array(8).fill(null),seatMuted=new Array(8).fill(false);
let rooms=[],myRoom=null,myRoomImg="",myRoomId="";
let hasRoom=false,inRoom=false;
let roomOwner={name:"",photo:""};
let savedRoomState=null;
let startY=0,isPulling=false;
let isMicOn=false;
let selectedSeat=null;

let musicLibrary=[],favorites=[],currentMusic=null;
let audioContext,source,dest;

document.getElementById('roomsList').addEventListener('touchstart',e=>{
    startY=e.touches[0].clientY;
});
document.getElementById('roomsList').addEventListener('touchmove',e=>{
    let y=e.touches[0].clientY;
    let diff=y-startY;
    if(diff>80 && document.getElementById('roomsList').scrollTop===0){
        isPulling=true;
        document.getElementById('pullRefresh').classList.add('active');
    }
});
document.getElementById('roomsList').addEventListener('touchend',e=>{
    if(isPulling){
        isPulling=false;
        document.getElementById('pullRefresh').innerText='جاري التحديث...';
        setTimeout(()=>{
            updateRoomsList();
            document.getElementById('pullRefresh').classList.remove('active');
            document.getElementById('pullRefresh').innerText='↻ اسحب للتحديث';
        },1500);
    }
});

document.getElementById('musicFileInput').onchange=function(e){
    let files=e.target.files;
    for(let file of files){
        let url=URL.createObjectURL(file);
        musicLibrary.push({
            name:file.name,
            url:url,
            artist:'<unknown>'
        });
    }
    renderMusicList();
};

document.getElementById('volumeSlider').oninput=function(e){
    if(document.getElementById('bgAudio')){
        document.getElementById('bgAudio').volume=e.target.value/100;
    }
};

document.getElementById('progressSlider').oninput=function(e){
    if(document.getElementById('bgAudio')){
        let audio=document.getElementById('bgAudio');
        audio.currentTime=(e.target.value/100)*audio.duration;
    }
};

document.getElementById('bgAudio').ontimeupdate=function(){
    let audio=document.getElementById('bgAudio');
    if(audio.duration){
        document.getElementById('progressSlider').value=(audio.currentTime/audio.duration)*100;
    }
};

function init(){
    setTimeout(()=>{
        document.getElementById('loadingScreen').style.display='none';
        document.getElementById('homeScreen').classList.add('active');
    },2000);
    updateRoomsList();
    updateMyRoomBox();
}
init();

function openMusicLibrary(){
    document.getElementById('musicLibrary').classList.add('active');
    renderMusicList();
}

function closeMusicLibrary(){
    document.getElementById('musicLibrary').classList.remove('active');
}

function renderMusicList(){
    let list=document.getElementById('musicList');
    let data=currentTab==='fav'?favorites:musicLibrary;

    if(data.length===0){
        list.innerHTML='<div style="text-align:center;color:var(--text-dim);margin-top:50px">مفيش أغاني لسه</div>';
        return;
    }

    list.innerHTML='';
    data.forEach((song,index)=>{
        let isFav=favorites.some(f=>f.url===song.url);
        list.innerHTML+=`
        <div class="music-item">
            <div class="music-icon">💿</div>
            <div class="music-info" onclick="playMusicFromList(${index})">
                <div class="music-name">${song.name}</div>
                <div class="music-artist">${song.artist}</div>
            </div>
            <div class="fav-btn ${isFav?'active':''}" onclick="toggleFavorite(${index})">❤</div>
            <div style="font-size:24px;cursor:pointer" onclick="playMusicFromList(${index})">▶</div>
        </div>`;
    });
}

let currentTab='all';
function switchTab(tab){
    currentTab=tab;
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    renderMusicList();
}

function toggleFavorite(index){
    let song=musicLibrary[index];
    let favIndex=favorites.findIndex(f=>f.url===song.url);
    if(favIndex>-1){
        favorites.splice(favIndex,1);
    }else{
        favorites.push(song);
    }
    renderMusicList();
}

function playMusicFromList(index){
    let song=musicLibrary[index];
    currentMusic=song;
    let audio=document.getElementById('bgAudio');
    audio.src=song.url;
    audio.volume = document.getElementById('volumeSlider').value / 100;

    if(!audioContext){
        audioContext=new (window.AudioContext || window.webkitAudioContext)();
    }
    if(audioContext.state === 'suspended'){
        audioContext.resume();
    }

    audio.play().catch(err => {
        console.log('Play failed:', err);
        alert('دوس على الشاشة مرة كده وجرب تاني');
    });

    document.getElementById('nowPlaying').style.display='block';
    document.getElementById('songName').innerText=song.name;
    broadcast({type:'music',name:song.name});

    if(source) source.disconnect();
    source=audioContext.createMediaElementSource(audio);
    dest=audioContext.createMediaStreamDestination();
    source.connect(dest);
    musicStream=dest.stream;

    connections.forEach(conn=>{
        if(conn.open && musicStream){
            peer.call(conn.peer, musicStream);
        }
    });

    closeMusicLibrary();
}

function playAllMusic(){
    if(musicLibrary.length>0){
        playMusicFromList(0);
    }
}

function searchMusic(){
    let query=document.getElementById('searchInput').value.toLowerCase();
    let filtered=musicLibrary.filter(s=>s.name.toLowerCase().includes(query));
    let list=document.getElementById('musicList');

    if(filtered.length===0){
        list.innerHTML='<div style="text-align:center;color:var(--text-dim);margin-top:50px">مفيش نتائج</div>';
        return;
    }

    list.innerHTML='';
    filtered.forEach((song,index)=>{
        let isFav=favorites.some(f=>f.url===song.url);
        list.innerHTML+=`
        <div class="music-item">
            <div class="music-icon">💿</div>
            <div class="music-info" onclick="playMusicFromList(${musicLibrary.indexOf(song)})">
                <div class="music-name">${song.name}</div>
                <div class="music-artist">${song.artist}</div>
            </div>
            <div class="fav-btn ${isFav?'active':''}" onclick="toggleFavorite(${musicLibrary.indexOf(song)})">❤</div>
            <div style="font-size:24px;cursor:pointer" onclick="playMusicFromList(${musicLibrary.indexOf(song)})">▶</div>
        </div>`;
    });
}

function showScreen(screenId){
    document.querySelectorAll('.home-screen,.profile-screen,.room-screen')
.forEach(s=>s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    if(screenId==='homeScreen')document.querySelectorAll('.nav-item')[1].classList.add('active');
    if(screenId==='profileScreen')document.querySelectorAll('.nav-item')[0].classList.add('active');
}

function goToProfile(){
    document.getElementById('loadingScreen').style.display='flex';
    setTimeout(()=>{
        document.getElementById('loadingScreen').style.display='none';
        showScreen('profileScreen');
    },1200);
}

function updateRoomsList(){
    let container=document.getElementById('roomsContainer');
    if(rooms.length===0){
        container.innerHTML='<div class="no-rooms">مفيش غرف لسه. اعمل غرفة جديدة</div>';
        return;
    }
    container.innerHTML="";
    rooms.forEach(room=>{
        container.innerHTML+=`
        <div class="room-item" onclick="joinRoom('${room.id}')">
            <div class="room-info">
                <div class="room-name">${room.name}</div>
                <div class="room-desc">المضيف: ${room.owner} • 0 متصل</div>
            </div>
            <img class="room-avatar" src="${room.img}">
        </div>`;
    });
}

function updateMyRoomBox(){
    let box=document.getElementById('myRoomBox');
    if(myRoom){
        box.innerHTML=`<div class="my-room" onclick="joinRoom('${myRoomId}')">
            🔰 غرفتي: ${myRoom}
            <div style="font-size:13px;color:var(--text-dim);margin-top:6px">اضغط للدخول</div>
        </div>`;
    }else{
        box.innerHTML='<div class="my-room">معندكش غرفة لسه</div>';
    }
}

function createRoomModal(){
    if(hasRoom){
        alert('انت عامل غرفة بالفعل');
        return;
    }
    document.getElementById('createModal').classList.add('active');
}
function closeModal(){document.getElementById('createModal').classList.remove('active');}

function createRoom(){
    let roomName=document.getElementById('roomNameInput').value.trim();
    if(!roomName)return;
    hasRoom=true;
    myRoom=roomName;
    myRoomImg=myPhoto;
    myRoomId='room_'+Date.now();
    roomOwner={name:myName,photo:myPhoto};
    closeModal();
    enterRoom(myRoomId,roomName);
    rooms=[{id:myRoomId,name:roomName,owner:myName,img:myRoomImg}];
    updateRoomsList();
    updateMyRoomBox();
}

function joinRoom(roomId){
    let room=rooms.find(r=>r.id===roomId);
    if(room){
        roomOwner={name:room.owner,photo:room.img};
        enterRoom(roomId,room.name);
    }
}

function enterRoom(roomId,name){
    inRoom=true;
    document.getElementById('bottomNav').classList.add('hidden');
    document.getElementById('loadingScreen').style.display='flex';

    setTimeout(()=>{
        document.getElementById('loadingScreen').style.display='none';
        showScreen('roomScreen');

        document.getElementById('roomName').innerText=name;
        document.getElementById('ownerName').innerText=roomOwner.name;
        document.getElementById('ownerAvatar').src=roomOwner.photo;

        let grid=document.getElementById('seatsGrid');
        grid.innerHTML='';
        for(let i=0;i<8;i++){
            grid.innerHTML+=`
            <div class="seat" id="seat${i}" onclick="seatClick(${i})">
                <div class="seat-num">${i+1}</div>
            </div>`;
        }

        peer=new Peer();
        peer.on('open',id=>{
            myId=id;
            navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
                localStream=s;
                localStream.getAudioTracks()[0].enabled=false;
            });
        });

        peer.on('call',call=>{
            call.answer(localStream);
            call.on('stream',stream=>{playAudio(stream);});
        });

        peer.on('connection',conn=>{
            connections.push(conn);
            conn.on('data',handleData);
        });
    },1500);
}

function seatClick(seatNum){
    selectedSeat=seatNum;
    if(seatStatus[seatNum] && seatStatus[seatNum]!=myId){
        alert('المايك ده مشغول');
        return;
    }
    showSeatMenu(seatNum);
}

function showSeatMenu(seatNum){
    let modal=document.getElementById('micMenuModal');
    let title=document.getElementById('micMenuTitle');
    let buttons=document.getElementById('micMenuButtons');

    title.innerText='مايك رقم '+(seatNum+1);
    buttons.innerHTML='';

    if(seatStatus[seatNum]!=myId){
        buttons.innerHTML+=`<button class="btn-create" onclick="takeMic(${seatNum})">🎤 خد المايك</button>`;
    }

    if(mySeat===seatNum){
        buttons.innerHTML+=`<button class="btn-save" onclick="toggleMic()">🎤 ${isMicOn?'اقفل المايك':'افتح المايك'}</button>`;
        buttons.innerHTML+=`<button class="btn-danger" onclick="leaveSeat()">🚪 سيب المايك</button>`;
    }

    buttons.innerHTML+=`<button class="btn-cancel" onclick="closeMicMenu()">إلغاء</button>`;
    modal.classList.add('active');
}

function closeMicMenu(){
    document.getElementById('micMenuModal').classList.remove('active');
    selectedSeat=null;
}

function takeMic(seatNum){
    if(seatStatus[seatNum] && seatStatus[seatNum]!=myId)return;

    for(let i=0;i<8;i++){
        document.getElementById('seat'+i).classList.remove('talking');
    }

    if(mySeat!==null){
        seatStatus[mySeat]=null;
        seatMuted[mySeat]=false;
        updateSeatUI(mySeat,false);
    }

    mySeat=seatNum;
    seatStatus[seatNum]=myId;
    seatMuted[seatNum]=false;
    updateSeatUI(seatNum,true);
    document.getElementById('micBtn').disabled=false;

    closeMicMenu();
}

function leaveSeat(){
    if(mySeat===null)return;

    seatStatus[mySeat]=null;
    seatMuted[mySeat]=false;
    updateSeatUI(mySeat,false);

    if(isMicOn){
        isMicOn=false;
        if(localStream)localStream.getAudioTracks()[0].enabled=false;
        broadcast({type:'micStatus',seat:mySeat,muted:true,talking:false});
    }

    mySeat=null;
    document.getElementById('micBtn').disabled=true;
    document.getElementById('micBtn').classList.remove('muted');
    document.getElementById('micBtn').innerHTML='🎤';

    closeMicMenu();
}

function updateSeatUI(seatNum,occupied){
    let seat=document.getElementById('seat'+seatNum);
    seat.classList.toggle('occupied',occupied);
    seat.classList.toggle('muted',seatMuted[seatNum]);
    if(occupied){
        seat.innerHTML=`<img src="${seatNum===mySeat?myPhoto:'https://i.pravatar.cc/150?u='+seatStatus[seatNum]}">`;
    }else{
        seat.innerHTML=`<div class="seat-num">${seatNum+1}</div>`;
    }
}

function openMicMenu(){
    if(mySeat===null){
        alert('خد مايك الأول');
        return;
    }
    showSeatMenu(mySeat);
}

function toggleMic(){
    if(mySeat===null)return;

    isMicOn=!isMicOn;
    seatMuted[mySeat]=!isMicOn;

    if(localStream){
        localStream.getAudioTracks()[0].enabled=isMicOn;
    }

    document.getElementById('micBtn').classList.toggle('muted',!isMicOn);
    document.getElementById('micBtn').innerHTML=isMicOn?'🎤':'🔇';

    updateSeatUI(mySeat,true);

    if(isMicOn){
        let sound=document.getElementById('micSound');
        sound.currentTime=0;
        sound.volume=0.3;
        sound.play();

                document.getElementById('seat'+mySeat).classList.add('talking');
        broadcast({type:'micStatus',seat:mySeat,muted:false,talking:true});
    }else{
        document.getElementById('seat'+mySeat).classList.remove('talking');
        broadcast({type:'micStatus',seat:mySeat,muted:true,talking:false});
    }

    closeMicMenu();
}

function playAudio(stream){
    let audio=new Audio();
    audio.srcObject=stream;
    audio.play();
}

function sendMsg(){
    let msg=document.getElementById('chatInput').value.trim();
    if(!msg)return;
    broadcast({type:'chat',name:myName,msg:msg});
    addChatMsg(myName,msg,true);
    document.getElementById('chatInput').value='';
}

function handleData(data){
    if(data.type==='chat')addChatMsg(data.name,data.msg,false);

    if(data.type==='roomUpdate'){
        document.getElementById('roomName').innerText=data.name;
        document.getElementById('ownerAvatar').src=data.img;

        let roomIndex=rooms.findIndex(r=>r.id===data.id);
        if(roomIndex!==-1){
            rooms[roomIndex].name=data.name;
            rooms[roomIndex].img=data.img;
        }

        if(data.id===myRoomId){
            myRoom=data.name;
            myRoomImg=data.img;
            updateMyRoomBox();
        }

        updateRoomsList();

        if(savedRoomState && savedRoomState.id===data.id){
            savedRoomState.name=data.name;
            savedRoomState.img=data.img;
            document.getElementById('floatingImg').src=data.img;
            document.getElementById('floatingName').innerText=data.name;
        }
    }

    if(data.type==='micStatus'){
        seatMuted[data.seat]=data.muted;
        let seatEl=document.getElementById('seat'+data.seat);
        seatEl.classList.toggle('muted',data.muted);
        seatEl.classList.toggle('talking',data.talking);
    }

    if(data.type==='music'){
        document.getElementById('nowPlaying').style.display='block';
        document.getElementById('songName').innerText=data.name;
    }
}

function addChatMsg(name,msg,isOwn){
    let div=document.createElement('div');
    div.className='chat-msg';
    if(isOwn)div.classList.add('own');
    div.innerText=name+': '+msg;
    document.getElementById('chatMessages').appendChild(div);
    document.getElementById('chatMessages').scrollTop=99999;
}

function broadcast(data){
    connections.forEach(c=>{if(c.open)c.send(data);});
}

function changePhoto(){
    document.getElementById('photoInput').click();
}

document.getElementById('photoInput').onchange=function(e){
    let file=e.target.files[0];
    if(file){
        let reader=new FileReader();
        reader.onload=function(ev){
            myPhoto=ev.target.result;
            document.getElementById('profileAvatar').src=myPhoto;
        }
        reader.readAsDataURL(file);
    }
}

function openSettings(){
    document.getElementById('editRoomName').value=document.getElementById('roomName').innerText;
    document.getElementById('settingsModal').classList.add('active');
}
function closeSettings(){document.getElementById('settingsModal').classList.remove('active');}

function saveSettings(){
    let newName=document.getElementById('editRoomName').value.trim();
    let file=document.getElementById('editRoomImg').files[0];

    if(!newName &&!file){
        alert('اكتب اسم جديد او اختار صورة');
        return;
    }

    if(file){
        let reader=new FileReader();
        reader.onload=function(ev){
            let imgUrl=ev.target.result;
            let finalName=newName||myRoom;

            document.getElementById('roomName').innerText=finalName;
            document.getElementById('ownerAvatar').src=imgUrl;

            broadcast({type:'roomUpdate',id:myRoomId,name:finalName,img:imgUrl});

            myRoom=finalName;
            myRoomImg=imgUrl;

            let roomIndex=rooms.findIndex(r=>r.id===myRoomId);
            if(roomIndex!==-1){
                rooms[roomIndex].name=finalName;
                rooms[roomIndex].img=imgUrl;
            }
            updateRoomsList();
            updateMyRoomBox();
        }
        reader.readAsDataURL(file);
    }else{
        document.getElementById('roomName').innerText=newName;
        broadcast({type:'roomUpdate',id:myRoomId,name:newName,img:myRoomImg});

        myRoom=newName;
        let roomIndex=rooms.findIndex(r=>r.id===myRoomId);
        if(roomIndex!==-1){
            rooms[roomIndex].name=newName;
        }
        updateRoomsList();
        updateMyRoomBox();
    }
    closeSettings();
}

function exitRoomConfirm(){
    document.getElementById('exitModal').classList.add('active');
}
function closeExitModal(){document.getElementById('exitModal').classList.remove('active');}

function exitRoom(save){
    closeExitModal();
    if(save){
        savedRoomState={
            id:myRoomId,
            name:myRoom,
            img:myRoomImg,
            owner:roomOwner.name
        };
        document.getElementById('floatingRoom').classList.add('active');
        document.getElementById('floatingImg').src=savedRoomState.img;
        document.getElementById('floatingName').innerText=savedRoomState.name;
    }

    connections.forEach(c=>c.close());
    if(peer)peer.destroy();
    if(localStream)localStream.getTracks().forEach(t=>t.stop());
    if(musicStream)musicStream.getTracks().forEach(t=>t.stop());
    document.getElementById('bgAudio').pause();
    document.getElementById('nowPlaying').style.display='none';

    showScreen('homeScreen');
    document.getElementById('bottomNav').classList.remove('hidden');
    inRoom=false;
    mySeat=null;
    seatStatus=new Array(8).fill(null);
    seatMuted=new Array(8).fill(false);
    musicStream=null;
    isMicOn=false;
}

function reenterRoom(){
    if(savedRoomState){
        document.getElementById('floatingRoom').classList.remove('active');
        joinRoom(savedRoomState.id);
    }
}
</script>
