<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1xbox</title>
<style>
* { box-sizing: border-box; margin:0; padding:0; font-family: 'Tahoma', Arial, sans-serif; }
body { 
  background:#0f172a; 
  min-height:100vh;
  background-image: 
    linear-gradient(rgba(59,130,246,0.1) 1px, transparent 1px),
    linear-gradient(90deg, rgba(59,130,246,0.1) 1px, transparent 1px);
  background-size:50px 50px;
}

#authScreen {
  min-height:100vh;
  display:flex; 
  align-items:center; 
  justify-content:center;
}

.authBox {
  background:rgba(30,41,59,0.9);
  padding:35px 30px;
  border-radius:18px;
  width:90%; 
  max-width:400px;
  border:2px solid transparent;
  background-clip:padding-box;
  box-shadow:0 0 40px rgba(59,130,246,0.4);
  position:relative;
}
.authBox::before {
  content:'';
  position:absolute;
  top:-2px; left:-2px; right:-2px; bottom:-2px;
  background:linear-gradient(45deg, #3b82f6, #facc15, #3b82f6);
  border-radius:18px;
  z-index:-1;
  animation:borderGlow 3s linear infinite;
}
@keyframes borderGlow {
 0%,100%{opacity:1} 50%{opacity:0.5}
.authBox h2 { 
  text-align:center; 
  margin-bottom:30px; 
  font-size:28px; 
  color:#fff;
}

.authBox input {
  width:100%; 
  padding:16px; 
  margin:12px 0;
  border-radius:12px; 
  border:1px solid #475569;
  background:#1e293b; 
  color:#fff; 
  font-size:16px;
  text-align:right;
  outline:none;
}
.authBox input:focus { 
  border-color:#3b82f6; 
  box-shadow:0 0 0 3px rgba(59,130,246,0.2); 
}
.authBox input::placeholder { color:#94a3b8; }

.authBox button {
  width:100%; 
  padding:16px; 
  margin:10px 0;
  border-radius:12px; 
  border:none;
  background:linear-gradient(90deg,#facc15,#fbbf24);
  color:#000; 
  font-weight:bold; 
  font-size:18px;
  cursor:pointer; 
  transition:0.3s;
}
.authBox button:hover { 
  transform:translateY(-2px); 
  box-shadow:0 5px 20px rgba(250,204,21,0.5); 
}

#gameScreen { 
  display:none; 
  width:100%;
  min-height:100vh;
  padding:20px;
  color:#fff;
}
.topBar {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:30px;
  background:rgba(15,23,42,0.8);
  padding:15px;
  border-radius:12px;
}
.balanceBox {
  background:#334155; 
  padding:12px 20px; 
  border-radius:20px;
  display:flex; 
  align-items:center; 
  gap:8px;
  font-weight:bold; 
  color:#facc15;
  font-size:18px;
}
.userIDBox {
  background:linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
  color:#000;
  padding:8px 16px;
  border-radius:20px;
  font-weight:bold;
  font-size:14px;
}
.shopBtn {
  background:#f59e0b;
  width:50px;
  height:50px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
}
.gameContent {
  text-align:center;
  padding:50px 20px;
}
.gameContent h1 {
  font-size:32px;
  margin-bottom:20px;
  color:#facc15;
}

.panel {
  position:fixed; 
  top:0; left:0; 
  width:100%; 
  height:100%;
  background:rgba(0,0,0,0.95);
  display:none; 
  align-items:center; 
  justify-content:center;
  z-index:100;
}
.panelBox {
  background:#1e293b;
  border-radius:16px;
  width:90%; 
  max-width:500px;
  max-height:90vh;
  overflow-y:auto;
}
.panelHeader {
  background:linear-gradient(180deg,#4c1d95,#1e1b4b);
  padding:20px;
  text-align:center;
  position:relative;
}
.closeBtn {
  position:absolute; 
  top:15px; left:15px;
  background:rgba(255,255,255,0.1);
  width:40px; height:40px; 
  border-radius:50%;
  border:none; 
  color:#fff; 
  font-size:20px; 
  cursor:pointer;
}
.panelContent { padding:20px; }
.shopGrid {
  display:grid; 
  grid-template-columns:repeat(2,1fr); 
  gap:12px;
}
.shopItem {
  background:#334155; 
  padding:15px; 
  border-radius:12px;
  text-align:center;
}
.shopItem h4 { 
  color:#facc15; 
  margin:5px 0; 
  font-size:18px;
}
.shopItem button {
  width:100%; 
  padding:10px; 
  margin-top:10px;
  background:#22c55e; 
  border:none; 
  border-radius:8px;
  color:#fff; 
  font-weight:bold; 
  cursor:pointer;
}
.shopItem button:disabled { 
  background:#475569; 
  cursor:not-allowed; 
}
.hidden { display:none !important; }
</style>
</head>
<body>

<div id="authScreen">
  <div class="authBox">
    <h2>تسجيل / دخول 🎮</h2>
    <input type="email" id="email" placeholder="الإيميل">
    <input type="password" id="password" placeholder="الباسورد">
    <button onclick="signIn()">دخول</button>
    <button onclick="signUp()">إنشاء حساب</button>
  </div>
</div>

<div id="gameScreen">
  <div class="topBar">
    <div class="userIDBox">ID: <span id="userID">------</span></div>
    <div class="balanceBox">
      <span id="balance">0</span> 💰
    </div>
    <div class="shopBtn" onclick="openShop()">🛒</div>
  </div>
  <div class="gameContent">
    <h1>أهلاً بك في 1xbox</h1>
    <p>اشتري ID مميز من المتجر</p>
  </div>
</div>

<div class="panel" id="shopPanel">
  <div class="panelBox">
    <div class="panelHeader">
      <button class="closeBtn" onclick="closePanel('shopPanel')">×</button>
      <h2>🛒 IDs مميزة</h2>
    </div>
    <div class="panelContent">
      <div class="shopGrid" id="idShop"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, updateDoc, increment, query, where, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyC7nexX-dwj_IhYC5EaS-DU_YQeE6-acDw",
  authDomain: "game-af286.firebaseapp.com",
  projectId: "game-af286",
  storageBucket: "game-af286.firebasestorage.app",
  messagingSenderId: "567693078252",
  appId: "1:567693078252:web:3b5d6475a583f1f7347fc9",
  measurementId: "G-JKFYDGCFML"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const specialIDs = [
  {id: "VIP001", price: 1000},
  {id: "VIP002", price: 1500},
  {id: "11111", price: 2000},
  {id: "BOSS1", price: 3000},
  {id: "22222", price: 4000},
  {id: "33333", price: 5000},
  {id: "KING1", price: 8500},
  {id: "100", price: 10000}
];

let currentUser = null;
let userData = { coins: 0, shortID: '', ownedIDs: [] };

onAuthStateChanged(auth, async (user) => {
  if (user) {
    currentUser = user;
    document.getElementById('authScreen').classList.add('hidden');
    document.getElementById('gameScreen').style.display = 'block';
    await loadUser();
  }
});

window.signUp = async () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  if(!email || !pass) return alert("املأ البيانات");
  try {
    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
    let shortID = generateShortID();
    await setDoc(doc(db, "users", userCred.user.uid), {
      coins: 1000,
      shortID: shortID,
      ownedIDs: []
    });
    alert("تم إنشاء الحساب. ID بتاعك: " + shortID);
  } catch(e) { alert(e.message); }
}

window.signIn = async () => {
  const email = document.getElementById('email').value;
  const pass = document.getElementById('password').value;
  if(!email || !pass) return alert("املأ البيانات");
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch(e) { alert(e.message); }
}

function generateShortID() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let result = '';
  for (let i = 0; i < 8; i++) {
    result += chars.charAt(Math.floor(Math.random() * chars.length));
  }
  return result;
}

async function loadUser() {
  const ref = doc(db, "users", currentUser.uid);
  const snap = await getDoc(ref);
  if (snap.exists()) {
    userData = snap.data();
    document.getElementById('userID').innerText = userData.shortID || '------';
    document.getElementById('balance').innerText = userData.coins.toLocaleString();
    loadSpecialIDs();
  }
}

function loadSpecialIDs() {
  const shop = document.getElementById('idShop');
  shop.innerHTML = '';
  specialIDs.forEach(item => {
    const owned = userData.ownedIDs?.includes(item.id);
    shop.innerHTML += `
      <div class="shopItem">
        <h4>${item.id}</h4>
        <div style="color:#94a3b8;">${item.price} كوينز</div>
        <button onclick="buyID('${item.id}',${item.price})" ${owned? 'disabled' : ''}>
          ${owned? 'تم الشراء' : 'شراء'}
        </button>
      </div>
    `;
  });
}

window.buyID = async (id, price) => {
  if(userData.coins < price) return alert("معكش كوينز كفاية");
  if(userData.ownedIDs?.includes(id)) return alert("اشتريته خلاص");

  const q = query(collection(db, "users"), where("shortID", "==", id));
  const snap = await getDocs(q);
  if(!snap.empty) return alert("الـ ID ده متاخد");

  try {
    await updateDoc(doc(db, "users", currentUser.uid), {
      coins: increment(-price),
      shortID: id,
      ownedIDs: [...(userData.ownedIDs || []), id]
    });
    userData.coins -= price;
    userData.shortID = id;
    userData.ownedIDs.push(id);
    document.getElementById('balance').innerText = userData.coins.toLocaleString();
    document.getElementById('userID').innerText = id;
    loadSpecialIDs();
    alert("مبروك! بقى الـ ID بتاعك " + id);
  } catch(e) { alert(e.message); }
}

window.openShop = () => document.getElementById('shopPanel').style.display = 'flex';
window.closePanel = (id) => document.getElementById(id).style.display = 'none';
</script>
</body>
</html>
